<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫻花盃 國小資訊應用競賽</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Serif TC (Japanese/Wafu Aesthetic) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'washi': '#F4F6F9',     /* 微藍的白紙色背景 */
                        'ai': '#1C305C',        /* 藍染 深藍 */
                        'ruri': '#1E50A2',      /* 琉璃 亮藍 */
                        'mizu': '#86A6C1',      /* 水色 淺藍灰 */
                        'asagi': '#00A3AF',     /* 淺蔥 青藍 */
                        'kachi': '#171C26',     /* 褐色/深墨藍 (文字用) */
                        'seiji': '#81C7D4'      /* 青磁 亮淺藍 */
                    },
                    fontFamily: {
                        'serif': ['"Noto Serif TC"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #F4F6F9; 
            color: #171C26; 
            /* 淺淺的障子/格子紋理背景 */
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(28, 48, 92, 0.03) 25%, rgba(28, 48, 92, 0.03) 26%, transparent 27%, transparent 74%, rgba(28, 48, 92, 0.03) 75%, rgba(28, 48, 92, 0.03) 76%, transparent 77%, transparent), 
                linear-gradient(90deg, transparent 24%, rgba(28, 48, 92, 0.03) 25%, rgba(28, 48, 92, 0.03) 26%, transparent 27%, transparent 74%, rgba(28, 48, 92, 0.03) 75%, rgba(28, 48, 92, 0.03) 76%, transparent 77%, transparent);
            background-size: 40px 40px;
        }
        
        /* 和風卡片 */
        .wafu-card { 
            background: rgba(255, 255, 255, 0.95); 
            border: 1px solid #86A6C1; 
            border-radius: 2px;
            box-shadow: 2px 2px 10px rgba(28, 48, 92, 0.05); 
            position: relative;
            transition: all 0.3s ease;
        }
        .wafu-card::before { /* 左側藍染裝飾線 */
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background-color: #1C305C;
        }
        .wafu-card:hover {
            box-shadow: 4px 4px 15px rgba(28, 48, 92, 0.15); 
            border-color: #1E50A2;
        }

        /* 和風按鈕 */
        .wafu-btn {
            background-color: #1C305C;
            color: white;
            border: 1px solid #1C305C;
            border-radius: 2px;
            font-weight: 600;
            letter-spacing: 0.05em;
            padding: 0.5rem 1.5rem;
            transition: all 0.2s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .wafu-btn:hover { background-color: #1E50A2; border-color: #1E50A2; }
        .wafu-btn-outline { background-color: transparent; color: #1C305C; border: 1px solid #1C305C; }
        .wafu-btn-outline:hover { background-color: rgba(28, 48, 92, 0.05); }
        .wafu-btn-danger { background-color: transparent; color: #9B2C2C; border: 1px solid #9B2C2C; } 
        .wafu-btn-danger:hover { background-color: rgba(155, 44, 44, 0.05); }

        /* 輸入框樣式 */
        .wafu-input {
            border: 1px solid #86A6C1;
            border-radius: 2px;
            padding: 0.5rem 0.75rem;
            font-family: inherit;
            background-color: #FAFAFB;
            transition: all 0.2s;
            width: 100%;
        }
        .wafu-input:focus {
            outline: none;
            background-color: white;
            border-color: #1C305C;
            box-shadow: 0 0 0 1px #1C305C;
        }

        /* 日式標題裝飾底線 */
        .wafu-title-border {
            border-bottom: 2px solid #1C305C;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .wafu-title-border::after {
            content: ''; position: absolute; bottom: -4px; left: 0; width: 40px; height: 2px; background-color: #86A6C1;
        }

        /* Toast Animation */
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .toast-leave { transform: translateY(0); opacity: 1; }
        .toast-leave-active { transform: translateY(100%); opacity: 0; transition: all 0.3s ease-in; }
    </style>
</head>
<body class="font-serif min-h-screen flex flex-col selection:bg-mizu selection:text-white">

    <!-- Navigation -->
    <nav class="bg-ai border-b border-mizu sticky top-0 z-40 text-washi shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center cursor-pointer transition hover:text-seiji" onclick="navigate('home')">
                    <i class="fa-solid fa-water text-seiji text-xl mr-3"></i>
                    <span id="nav-brand-text" class="font-bold text-xl tracking-widest">櫻花盃<span class="text-sm ml-2 hidden sm:inline font-normal text-mizu">資訊應用競賽</span></span>
                </div>
                <div class="flex items-center space-x-4 sm:space-x-6 text-sm font-semibold" id="nav-menu">
                    <!-- Nav items injected by JS -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10" id="app-content">
        <div class="flex flex-col justify-center items-center h-64 text-ai">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
            <p class="tracking-widest">系統載入中...</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-kachi text-mizu py-8 text-center text-xs border-t border-ai mt-auto">
        <p id="footer-brand-text" class="tracking-widest mb-2">© 2026 櫻花盃 國小資訊應用競賽</p>
        <p class="text-gray-500">青き志、未来を創る (Blue Ambition Creates the Future)</p>
    </footer>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col space-y-3"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

            const firebaseConfig = {
  apiKey: "AIzaSyDrvKnxeqMEvJmcfwbl1bpKP8a2BXrtdb8",
  authDomain: "game-3b68a.firebaseapp.com",
  projectId: "game-3b68a",
  storageBucket: "game-3b68a.firebasestorage.app",
  messagingSenderId: "835111282052",
  appId: "1:835111282052:web:2fb8a3a24fa3a98c1aa9d1"
};

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const state = {
            currentPage: 'home',
            currentUser: null,
            authUser: null,
            data: { news: [], categories: [], works: [], users: [], settings: {} },
            unsubscribes: []
        };

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            // Blue theme toast
            const bgColor = type === 'success' ? 'bg-ai' : 'bg-red-900';
            const textColor = 'text-washi';
            const icon = type === 'success' ? 'fa-check' : 'fa-exclamation-triangle';
            
            toast.className = `${bgColor} ${textColor} px-6 py-4 rounded border border-mizu shadow-lg font-serif flex items-center space-x-3 toast-enter tracking-wider`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i><span>${message}</span>`;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-enter-active');
            });

            setTimeout(() => {
                toast.classList.remove('toast-enter-active');
                toast.classList.add('toast-leave-active');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        window.navigate = (page) => {
            state.currentPage = page;
            render();
        };

        const getCollectionRef = (colName) => collection(db, 'artifacts', appId, 'public', 'data', colName);
        const getDocRef = (colName, docId) => doc(db, 'artifacts', appId, 'public', 'data', colName, docId);

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                showToast("系統連線異常", "error");
                render();
            }
        };

        onAuthStateChanged(auth, async (user) => {
            state.authUser = user;
            if (user) {
                setupRealtimeListeners();
                render();
            } else {
                cleanupListeners();
                render();
            }
        });

        const setupRealtimeListeners = () => {
            cleanupListeners(); 
            const collections = ['news', 'categories', 'works', 'users', 'settings'];
            
            collections.forEach(col => {
                const unsubscribe = onSnapshot(getCollectionRef(col), (snapshot) => {
                    if (col === 'settings') {
                        let settingsData = {};
                        snapshot.forEach(doc => { if (doc.id === 'general') settingsData = doc.data(); });
                        state.data.settings = settingsData;
                        const mainT = settingsData.siteTitleMain || '櫻花盃';
                        const subT = settingsData.siteTitleSub || '國小資訊應用競賽';
                        document.title = `${mainT} ${subT}`;
                    } else {
                        state.data[col] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    }
                    
                    if (col === 'users' && state.data.users.length === 0) {
                        createDefaultAdmin();
                    }
                    
                    if (col === 'users' && state.currentUser) {
                        const updatedMe = state.data.users.find(u => u.id === state.currentUser.id);
                        if (!updatedMe) {
                            window.handleLogout();
                            showToast("您的帳號已被登出", "error");
                        } else {
                            state.currentUser = updatedMe; 
                        }
                    }

                    render();
                }, (error) => {
                    console.error(`Error listening to ${col}:`, error);
                    showToast(`資料同步失敗 (${col})`, "error");
                });
                state.unsubscribes.push(unsubscribe);
            });
        };

        const cleanupListeners = () => {
            state.unsubscribes.forEach(unsub => unsub());
            state.unsubscribes = [];
        };

        const createDefaultAdmin = async () => {
            try {
                await addDoc(getCollectionRef('users'), {
                    username: 'admin',
                    password: 'admin123',
                    name: '系統管理員',
                    role: 'admin',
                    createdAt: Date.now()
                });
            } catch (e) { console.error(e); }
        };

        const render = () => {
            const content = document.getElementById('app-content');
            
            if (!state.authUser) {
                content.innerHTML = `
                    <div class="flex flex-col justify-center items-center h-64 text-ai wafu-card p-10 max-w-lg mx-auto mt-10 text-center">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-4 text-mizu"></i>
                        <h2 class="text-xl font-bold tracking-widest mb-2">連線發生異常</h2>
                        <p class="text-sm text-gray-500">請嘗試重新整理頁面以恢復連線。</p>
                    </div>`;
                return; 
            }
            
            renderNav();
            
            switch (state.currentPage) {
                case 'home': content.innerHTML = tmplHome(); break;
                case 'works': content.innerHTML = tmplWorks(); break;
                case 'login': content.innerHTML = tmplLogin(); break;
                case 'admin': content.innerHTML = state.currentUser?.role === 'admin' ? tmplAdmin() : tmplHome(); break;
                case 'student': content.innerHTML = state.currentUser?.role === 'student' ? tmplStudent() : tmplHome(); break;
                case 'judge': content.innerHTML = state.currentUser?.role === 'judge' ? tmplJudge() : tmplHome(); break;
                default: content.innerHTML = tmplHome();
            }
        };

        const renderNav = () => {
            const menu = document.getElementById('nav-menu');
            const activeClass = (page) => state.currentPage === page ? 'text-seiji border-b-2 border-seiji pb-1' : 'hover:text-mizu transition pb-1';
            
            const mainT = state.data.settings?.siteTitleMain || '櫻花盃';
            const subT = state.data.settings?.siteTitleSub || '國小資訊應用競賽';
            const navBrand = document.getElementById('nav-brand-text');
            if(navBrand) navBrand.innerHTML = `${escapeHtml(mainT)}<span class="text-sm ml-2 hidden sm:inline font-normal text-mizu">${escapeHtml(subT)}</span>`;
            const footerBrand = document.getElementById('footer-brand-text');
            if(footerBrand) footerBrand.innerText = `© 2026 ${mainT} ${subT}`;

            let html = `
                <button onclick="navigate('home')" class="${activeClass('home')} tracking-widest">首頁</button>
                <button onclick="navigate('works')" class="${activeClass('works')} tracking-widest hidden sm:inline-block">作品大廳</button>
            `;

            if (!state.currentUser) {
                html += `<button onclick="navigate('login')" class="wafu-btn text-xs ml-4 border-washi text-washi">登入系統</button>`;
            } else {
                const roleLabels = { admin: '管理後台', student: '學生專區', judge: '評分專區' };
                const rolePage = state.currentUser.role;
                html += `
                    <button onclick="navigate('${rolePage}')" class="${activeClass(rolePage)} tracking-widest">${roleLabels[rolePage]}</button>
                    <span class="text-xs text-mizu hidden md:inline border-l border-mizu pl-4 ml-2">${state.currentUser.name}</span>
                    <button onclick="handleLogout()" class="hover:text-mizu transition ml-4" title="登出"><i class="fa-solid fa-right-from-bracket"></i></button>
                `;
            }
            menu.innerHTML = html;
        };

        const tmplHome = () => {
            const newsHtml = state.data.news.sort((a,b) => b.createdAt - a.createdAt).map(n => `
                <div class="wafu-card p-6 mb-6">
                    <h3 class="text-xl font-bold mb-2 text-ai">${escapeHtml(n.title)}</h3>
                    <p class="text-xs text-mizu mb-4 flex items-center">
                        <i class="fa-regular fa-clock mr-2"></i> ${new Date(n.createdAt).toLocaleDateString('zh-TW')}
                    </p>
                    <p class="text-gray-700 whitespace-pre-wrap leading-relaxed">${escapeHtml(n.content)}</p>
                </div>
            `).join('') || `
                <div class="text-center p-10 bg-white border border-mizu text-mizu">
                    <i class="fa-solid fa-fan text-3xl mb-4 opacity-50"></i>
                    <p class="tracking-widest">尚無公告消息</p>
                </div>`;

            const mainT = state.data.settings?.siteTitleMain || '櫻花盃';
            const subT = state.data.settings?.siteTitleSub || '國小資訊應用競賽';

            return `
                <div class="text-center mb-16 mt-8">
                    <div class="inline-block">
                        <h1 class="text-4xl md:text-5xl font-black text-ai mb-4 tracking-widest" style="text-shadow: 2px 2px 0px rgba(134,166,193,0.3);">${escapeHtml(mainT)}</h1>
                        <p class="text-lg text-mizu tracking-[0.2em]">${escapeHtml(subT)}</p>
                    </div>
                </div>
                
                <div class="max-w-3xl mx-auto">
                    <h2 class="text-2xl font-bold text-ai wafu-title-border flex items-center">
                        <i class="fa-solid fa-scroll mr-3 text-seiji"></i> 最新消息
                    </h2>
                    ${newsHtml}
                </div>
            `;
        };

        window.currentCategoryFilter = window.currentCategoryFilter || '';

        window.handleFilterChange = (val) => {
            window.currentCategoryFilter = val;
            render();
        };

        const tmplWorks = () => {
            const getCatName = (id) => state.data.categories.find(c => c.id === id)?.name || '未分類';
            const getStudentName = (id) => state.data.users.find(u => u.id === id)?.name || '未知參賽者';
            
            // 只有被管理員勾選為「公開 (isPublic)」的作品才會顯示在大廳
            let publicWorks = state.data.works.filter(w => w.isPublic === true);
            
            // 根據下拉選單篩選項目
            if (window.currentCategoryFilter) {
                publicWorks = publicWorks.filter(w => w.categoryId === window.currentCategoryFilter);
            }
            
            const worksHtml = publicWorks.map(w => {
                const displayTitle = `${getCatName(w.categoryId)} - ${getStudentName(w.studentId)}`;
                
                // 獎項標籤 (特別放大優等樣式)
                let awardBadge = '';
                if (w.award === '優等') {
                    awardBadge = `<span class="bg-[#fef9e7] text-[#B8860B] border-2 border-[#D4AF37] px-2 py-1 ml-3 text-xs font-bold tracking-widest whitespace-nowrap shadow-sm"><i class="fa-solid fa-crown mr-1 text-sm text-[#D4AF37]"></i>優等</span>`;
                }
                else if (w.award === '佳作') {
                    awardBadge = `<span class="bg-gray-100 text-gray-600 border border-gray-300 px-1 py-0.5 ml-2 text-[10px] tracking-widest whitespace-nowrap"><i class="fa-solid fa-medal mr-1"></i>佳作</span>`;
                }

                return `
                <div class="wafu-card p-5 flex flex-col justify-between cursor-pointer" onclick="viewWorkDetail('${w.id}')">
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-mizu bg-opacity-20 text-ai text-xs px-2 py-1 border border-mizu">${escapeHtml(getCatName(w.categoryId))}</span>
                            <span class="text-mizu text-xs tracking-wider"><i class="fa-solid fa-eye mr-1"></i>${w.views || 0}</span>
                        </div>
                        <h3 class="text-lg font-bold mb-2 text-ai transition flex items-center flex-wrap gap-y-2 leading-snug">${escapeHtml(displayTitle)}${awardBadge}</h3>
                    </div>
                    <div class="pt-4 mt-6 border-t border-gray-100 flex justify-between items-center">
                        <span class="text-sm font-semibold text-gray-600"><i class="fa-solid fa-user-pen text-mizu mr-2"></i>${escapeHtml(getStudentName(w.studentId))}</span>
                        <!-- 公開大廳不顯示成績 -->
                    </div>
                </div>
            `}).join('') || `
                <div class="col-span-full text-center py-16 border border-mizu border-dashed bg-white text-mizu">
                    <i class="fa-solid fa-box-open text-4xl mb-4 opacity-50"></i>
                    <p class="tracking-widest mb-2">大廳尚無符合的作品</p>
                    <p class="text-xs text-gray-400 tracking-widest">（得獎作品由系統審查後將公開發表於此）</p>
                </div>`;

            const catOptions = state.data.categories.map(c => 
                `<option value="${c.id}" ${window.currentCategoryFilter === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`
            ).join('');

            return `
                <div class="max-w-6xl mx-auto">
                    <div class="flex flex-col md:flex-row justify-between items-end mb-8 border-b-2 border-ai pb-4 relative">
                        <h2 class="text-2xl font-bold text-ai flex items-center mb-4 md:mb-0">
                            <i class="fa-solid fa-chess-board mr-3 text-seiji"></i> 競賽作品大廳
                        </h2>
                        <div class="w-full md:w-auto flex items-center bg-white p-2 border border-mizu shadow-sm">
                            <label class="text-sm text-ai font-bold mr-2 whitespace-nowrap"><i class="fa-solid fa-filter text-mizu mr-1"></i>過濾項目：</label>
                            <select onchange="handleFilterChange(this.value)" class="wafu-input text-sm !border-none !p-1 !bg-transparent !shadow-none cursor-pointer outline-none w-full min-w-[180px]">
                                <option value="">-- 顯示全部作品 --</option>
                                ${catOptions}
                            </select>
                        </div>
                        <div class="absolute bottom-[-4px] left-0 w-[40px] h-[2px] bg-mizu"></div>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${worksHtml}
                    </div>
                </div>

                <!-- Work Detail Modal -->
                <div id="work-modal" class="fixed inset-0 bg-kachi bg-opacity-80 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
                    <div class="wafu-card w-full max-w-xl p-8 relative bg-washi">
                        <button onclick="closeWorkModal()" class="absolute top-4 right-4 text-mizu hover:text-ai text-xl transition"><i class="fa-solid fa-xmark"></i></button>
                        <div id="modal-content"></div>
                    </div>
                </div>
            `;
        };

        const tmplLogin = () => `
            <div class="max-w-md mx-auto mt-12 wafu-card p-8 bg-white">
                <div class="mb-8 text-center border-b border-mizu pb-6">
                    <i class="fa-solid fa-torii-gate text-3xl text-ai mb-4"></i>
                    <h2 class="text-2xl font-bold text-ai tracking-widest">系統登入</h2>
                </div>
                <form onsubmit="handleLogin(event)" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-ai mb-2 tracking-widest">帳號 ID</label>
                        <input type="text" id="login-username" required class="wafu-input" placeholder="請輸入帳號">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-ai mb-2 tracking-widest">密碼 Password</label>
                        <input type="password" id="login-password" required class="wafu-input" placeholder="請輸入密碼">
                    </div>
                    <button type="submit" class="wafu-btn w-full py-3 mt-4 text-sm tracking-widest">登入系統</button>
                </form>
            </div>
        `;

        const tmplAdmin = () => {
            window.currentAdminTab = window.currentAdminTab || 'users';
            
            const tabClass = (tab) => window.currentAdminTab === tab 
                ? 'bg-ai text-washi px-6 py-2 text-sm tracking-widest border border-ai whitespace-nowrap' 
                : 'bg-white text-ai px-6 py-2 text-sm tracking-widest border border-mizu hover:bg-gray-50 whitespace-nowrap';

            let tabContent = '';
            
            if (window.currentAdminTab === 'users') {

                role: document.getElementById('add-u-role').value,
                createdAt: Date.now()
            };
            
            if (data.role === 'judge') {
                const assignedCat = document.getElementById('add-u-cat').value;
                if (assignedCat) data.assignedCategoryId = assignedCat;
            }

            if (state.data.users.some(u => u.username === data.username)) {
                showToast('此帳號已存在，請更換', 'error');
                return;
            }

            try {
                await addDoc(getCollectionRef('users'), data);
                showToast('帳號建檔完成');
                e.target.reset();
                document.getElementById('judge-cat-wrapper').style.display = 'none';
            } catch (err) { console.error(err); showToast('建檔失敗', 'error'); }
        };

        window.handleBulkImport = async () => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            const text = document.getElementById('bulk-students').value.trim();
            if (!text) {
                showToast('請輸入匯入資料', 'error');
                return;
            }
            
            const lines = text.split('\n');
            let successCount = 0;
            let skipCount = 0;
            
            showToast('系統處理中...');
            for (let line of lines) {
                const parts = line.split(',').map(s => s.trim());
                if (parts.length >= 3) {
                    const [name, username, password] = parts;
                    if (name && username && password) {
                        if (!state.data.users.some(u => u.username === username)) {
                            try {
                                await addDoc(getCollectionRef('users'), {
                                    name, username, password, role: 'student', createdAt: Date.now()
                                });
                                successCount++;
                            } catch(e) { console.error(e); skipCount++; }
                        } else {
                            skipCount++;
                        }
                    }
                }
            }
            showToast(`匯入程序完畢。新增：${successCount} 筆，略過重複/無效：${skipCount} 筆`);
            document.getElementById('bulk-students').value = '';
        };

        window.handleAddCategory = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            try {
                await addDoc(getCollectionRef('categories'), {
                    name: document.getElementById('add-c-name').value.trim(),
                    description: document.getElementById('add-c-desc').value.trim(),
                    createdAt: Date.now()
                });
                showToast('比賽項目設定完成');
                e.target.reset();
            } catch (err) { console.error(err); showToast('設定失敗', 'error'); }
        };

        window.handleEditCategory = async (id, oldName, oldDesc) => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            const newName = prompt("更新比賽項目名稱:", oldName);
            if (newName === null) return; 
            if (newName.trim() === '') {
                showToast('名稱不得為空', 'error');
                return;
            }
            const newDesc = prompt("更新項目說明:", oldDesc);
            
            try {
                await updateDoc(getDocRef('categories', id), {
                    name: newName.trim(),
                    description: newDesc !== null ? newDesc.trim() : oldDesc
                });
                showToast('項目資訊更新完成');
            } catch (err) { console.error(err); showToast('更新失敗', 'error'); }
        };

        window.handleAddNews = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            try {
                await addDoc(getCollectionRef('news'), {
                    title: document.getElementById('add-n-title').value.trim(),
                    content: document.getElementById('add-n-content').value.trim(),
                    createdAt: Date.now()
                });
                showToast('系統公告已發佈');
                e.target.reset();
            } catch (err) { console.error(err); showToast('發佈失敗', 'error'); }
        };

        window.handleUpdateSiteTitle = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            const mainTitle = document.getElementById('set-site-title-main').value.trim();
            const subTitle = document.getElementById('set-site-title-sub').value.trim();
            try {
                await setDoc(getDocRef('settings', 'general'), { 
                    siteTitleMain: mainTitle,
                    siteTitleSub: subTitle
                }, { merge: true });
                showToast('網站標題更新完成');
            } catch (err) { console.error(err); showToast('更新失敗', 'error'); }
        };

        window.handleUpdateWorkField = async (e, workId, field) => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            const value = field === 'isPublic' ? e.target.checked : e.target.value;
            try {
                await updateDoc(getDocRef('works', workId), { [field]: value });
                showToast(field === 'isPublic' ? (value ? '作品已公開至大廳' : '作品已隱藏') : '獎項設定已儲存');
            } catch (err) { console.error(err); showToast('狀態更新失敗', 'error'); }
        };

        window.handleExportScores = () => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            
            const getCatName = (id) => state.data.categories.find(c => c.id === id)?.name || '未分類';
            const getStudentName = (id) => state.data.users.find(u => u.id === id)?.name || '未知參賽者';

            let csv = "\uFEFF"; // 加上 BOM (Byte Order Mark) 使 Excel 能夠直接正常讀取 UTF-8
            csv += "比賽項目,參賽學生,平均分數,給予獎項,公開顯示,雲端作品連結\n";

            const worksWithScores = state.data.works.map(w => {
                let total = 0, count = 0;
                if(w.scores) Object.values(w.scores).forEach(s => { total += s; count++; });
                const avg = count > 0 ? (total / count).toFixed(1) : 0;
                return { ...w, avgScore: parseFloat(avg) };
            }).sort((a, b) => {
                if(a.categoryId !== b.categoryId) return (a.categoryId || '').localeCompare(b.categoryId || '');
                return b.avgScore - a.avgScore;
            });

            worksWithScores.forEach(w => {
                const cat = getCatName(w.categoryId);
                const stu = getStudentName(w.studentId);
                const award = w.award || '無';
                const isPub = w.isPublic ? '是' : '否';
                
                // 處理字串中可能有逗號導致跑版的問題 (加上引號)
                const row = [cat, stu, w.avgScore, award, isPub, w.driveLink]
                            .map(v => `"${String(v).replace(/"/g, '""')}"`)
                            .join(",");
                csv += row + "\n";
            });

            // 產生下載檔案
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `櫻花盃_競賽成績表_${new Date().toISOString().slice(0,10)}.csv`;
            link.style.display = "none";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast('成績表已匯出至 Excel (CSV) 格式');
        };

        window.updateJudgeCategory = async (userId, newCatId) => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            try {
                // 如果選項是空白，則更新為不指定(即代表全部項目)
                await updateDoc(getDocRef('users', userId), {
                    assignedCategoryId: newCatId || null
                });
                showToast('評審指定評分項目已變更');
            } catch (err) { console.error(err); showToast('變更失敗', 'error'); }
        };

        window.handleUploadWork = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'student') return;
            try {
                await addDoc(getCollectionRef('works'), {
                    studentId: state.currentUser.id,
                    categoryId: document.getElementById('up-category').value,
                    driveLink: document.getElementById('up-link').value.trim(),
                    views: 0,
                    scores: {}, 
                    createdAt: Date.now()
                });
                showToast('作品已成功遞交');
                e.target.reset();
            } catch (err) { console.error(err); showToast('遞交失敗', 'error'); }
        };

        window.handleScore = async (workId) => {
            if (!state.authUser || state.currentUser?.role !== 'judge') return;
            const scoreInput = document.getElementById(`score-${workId}`).value;
            const scoreNum = parseInt(scoreInput);
            
            if (isNaN(scoreNum) || scoreNum < 0 || scoreNum > 100) {
                showToast('評分請輸入 0-100 之數值', 'error');
                return;
            }

            try {
                const workRef = getDocRef('works', workId);
                const work = state.data.works.find(w => w.id === workId);
                const currentScores = work.scores || {};
                currentScores[state.currentUser.id] = scoreNum;
                
                await updateDoc(workRef, { scores: currentScores });
                showToast('評分紀錄已儲存');
            } catch (err) { console.error(err); showToast('儲存失敗', 'error'); }
        };

        window.deleteDocHandler = async (colName, docId) => {
            if (!state.authUser) return;
            if(confirm("確認執行刪除操作？此動作無法復原。")) {
                try {
                    await deleteDoc(getDocRef(colName, docId));
                    showToast('資料已刪除');
                } catch (err) { console.error(err); showToast('刪除失敗', 'error'); }
            }
        };

        window.viewWorkDetail = async (workId) => {
            const work = state.data.works.find(w => w.id === workId);
            if (!work) return;

            try {
                if(state.authUser) {
                   await updateDoc(getDocRef('works', workId), { views: (work.views || 0) + 1 });
                }
            } catch (e) { console.error("View increment failed", e); }

            const catName = state.data.categories.find(c=>c.id===work.categoryId)?.name || '未分類';
            const studentName = state.data.users.find(u=>u.id===work.studentId)?.name || '未知參賽者';
            const displayTitle = `${catName} - ${studentName}`;
            
            // 彈跳視窗的獎項標籤顯示 (同步放大優等樣式)
            let awardBadge = '';
            if (work.award === '優等') awardBadge = `<span class="bg-[#fef9e7] text-[#B8860B] border-2 border-[#D4AF37] px-4 py-1.5 text-sm tracking-widest ml-3 align-middle font-bold inline-block shadow-sm"><i class="fa-solid fa-crown mr-2 text-[#D4AF37]"></i>優等</span>`;
            else if (work.award === '佳作') awardBadge = `<span class="bg-gray-200 text-gray-700 border border-gray-400 px-3 py-1 text-xs tracking-widest ml-3 align-middle font-bold inline-block"><i class="fa-solid fa-medal mr-1"></i>佳作</span>`;

            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = `
                <div class="mb-8 text-center border-b border-mizu pb-6 pt-4">
                    <span class="bg-mizu bg-opacity-20 text-ai text-xs px-3 py-1 border border-mizu mb-4 inline-block tracking-widest">${escapeHtml(catName)}</span>
                    <h2 class="text-2xl font-bold text-ai mb-4 leading-relaxed flex flex-col items-center justify-center gap-2"><span>${escapeHtml(displayTitle)}</span> ${awardBadge}</h2>
                    <div class="flex justify-center items-center space-x-6 text-sm">
                        <span class="text-kachi font-semibold"><i class="fa-solid fa-user-pen mr-2 text-mizu"></i>${escapeHtml(studentName)}</span>
                        <span class="text-mizu">|</span>
                        <span class="text-gray-500"><i class="fa-regular fa-eye mr-2 text-mizu"></i>${(work.views || 0) + 1} 次觀看</span>
                    </div>
                </div>
                <div class="text-center mb-4">
                    <a href="${escapeHtml(work.driveLink)}" target="_blank" class="wafu-btn text-sm tracking-widest px-10 py-3 shadow-md">
                        <i class="fa-brands fa-google-drive mr-3"></i>檢視完整檔案
                    </a>
                </div>
            `;
            document.getElementById('work-modal').classList.remove('hidden');
        };

        window.closeWorkModal = () => {
            document.getElementById('work-modal').classList.add('hidden');
        };

        const escapeHtml = (unsafe) => {
            if(!unsafe) return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        };

        window.confirm = (msg) => {
            try { return window.top.confirm(msg); } catch(e) { return true; }
        }

        initAuth();

    </script>
</body>
</html>

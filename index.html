<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資訊應用競賽系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Serif TC (Japanese/Traditional Chinese aesthetic) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'washi': '#FAF9F6',      /* 和紙白 */
                        'sumi': '#2C2A29',       /* 墨黑 */
                        'ai': '#2C3E50',         /* 藍染 (深藍) */
                        'ruri': '#005CAF',       /* 琉璃 (亮藍) */
                        'mizu': '#81C7D4',       /* 水色 (淺藍) */
                        'torii': '#C0392B',      /* 用於刪除、錯誤提示 */
                        'gold': '#D4AF37'        /* 金色 (獎牌) */
                    },
                    fontFamily: {
                        'serif': ['"Noto Serif TC"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #FAF9F6; 
            color: #2C2A29; 
            background-image: 
                linear-gradient(90deg, rgba(44, 62, 80, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(44, 62, 80, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .wafu-card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #E5E7EB;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border-radius: 4px;
        }
        .rich-text-content p {
            margin-bottom: 0.25rem;
            line-height: 1.5;
        }
        .rich-text-content a {
            color: #005CAF;
            text-decoration: underline;
        }
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s ease-out; }
        .toast-leave { transform: translateY(0); opacity: 1; }
        .toast-leave-active { transform: translateY(100%); opacity: 0; transition: all 0.3s ease-in; }
    </style>
</head>
<body class="font-serif min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-ai text-washi shadow-md sticky top-0 z-40 border-b-4 border-ruri">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center cursor-pointer hover:opacity-80 transition" onclick="navigate('works')">
                    <i class="fa-solid fa-water text-mizu text-2xl mr-3"></i>
                    <span class="font-bold text-xl tracking-widest" id="nav-site-title">資訊應用競賽<span class="text-sm font-normal ml-2 hidden sm:inline text-gray-300" id="nav-site-subtitle"></span></span>
                </div>
                <div class="flex items-center space-x-2 sm:space-x-6" id="nav-menu">
                    <!-- Nav items injected by JS -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" id="app-content">
        <div class="flex flex-col justify-center items-center h-64 text-ai">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
            <p>系統載入中...</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-ai text-washi py-6 text-center text-sm border-t border-gray-600">
        <p id="footer-text">© 2026 資訊應用競賽系統. All Rights Reserved.</p>
    </footer>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col space-y-2"></div>

    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyB6NgZNLvexXfKwkW5eP4tNnkSHwuY8KyM",
  authDomain: "contactbook-c6d95.firebaseapp.com",
  projectId: "contactbook-c6d95",
  storageBucket: "contactbook-c6d95.firebasestorage.app",
  messagingSenderId: "655576113880",
  appId: "1:655576113880:web:15606f5cad291d8aca6dad"
};

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const state = {
            currentPage: 'works', // 預設首頁為作品大廳
            currentUser: null, 
            authUser: null, 
            data: {
                news: [],
                categories: [],
                works: [],
                users: [],
                settings: { title: '長安國小', subtitle: '資訊應用競賽' }
            },
            unsubscribes: []
        };

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-ai' : 'bg-torii';
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            toast.className = `${bgColor} text-washi px-6 py-3 rounded shadow-lg flex items-center space-x-3 toast-enter`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i><span>${message}</span>`;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-enter-active');
            });

            setTimeout(() => {
                toast.classList.remove('toast-enter-active');
                toast.classList.add('toast-leave-active');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        window.navigate = (page) => {
            state.currentPage = page;
            render();
        };

        const getCollectionRef = (colName) => collection(db, 'artifacts', appId, 'public', 'data', colName);
        const getDocRef = (colName, docId) => doc(db, 'artifacts', appId, 'public', 'data', colName, docId);

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                showToast("系統連線錯誤", "error");
                render(); 
            }
        };

        onAuthStateChanged(auth, async (user) => {
            state.authUser = user;
            if (user) {
                setupRealtimeListeners();
                render(); 
            } else {
                cleanupListeners();
                render(); 
            }
        });

        const setupRealtimeListeners = () => {
            cleanupListeners(); 
            
            const collections = ['news', 'categories', 'works', 'users', 'settings'];
            
            collections.forEach(col => {
                const unsubscribe = onSnapshot(getCollectionRef(col), (snapshot) => {
                    if (col === 'settings') {
                        if (!snapshot.empty) {
                            state.data.settings = snapshot.docs[0].data();
                            state.data.settings.id = snapshot.docs[0].id;
                        }
                    } else {
                        state.data[col] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    }
                    
                    if (col === 'users' && state.data.users.length === 0) {
                        createDefaultAdmin();
                    }
                    
                    if (col === 'users' && state.currentUser) {
                        const updatedMe = state.data.users.find(u => u.id === state.currentUser.id);
                        if (!updatedMe) {
                            window.handleLogout();
                            showToast("您的帳號已被移除", "error");
                        } else {
                            state.currentUser = updatedMe; 
                        }
                    }
                    render();
                }, (error) => {
                    console.error(`Error listening to ${col}:`, error);
                    showToast(`無法讀取資料 (${col})`, "error");
                });
                state.unsubscribes.push(unsubscribe);
            });
        };

        const cleanupListeners = () => {
            state.unsubscribes.forEach(unsub => unsub());
            state.unsubscribes = [];
        };

        const createDefaultAdmin = async () => {
            try {
                await addDoc(getCollectionRef('users'), {
                    username: 'admin',
                    password: 'admin123',
                    name: '系統管理員',
                    role: 'admin',
                    createdAt: Date.now()
                });
            } catch (e) { console.error(e); }
        };

        const render = () => {
            const content = document.getElementById('app-content');
            
            // 更新網站設定的標題
            document.title = `${state.data.settings.title} | ${state.data.settings.subtitle}`;
            document.getElementById('nav-site-title').innerHTML = `${escapeHtml(state.data.settings.title)}<span class="text-sm font-normal ml-2 hidden sm:inline text-gray-300" id="nav-site-subtitle">${escapeHtml(state.data.settings.subtitle)}</span>`;
            document.getElementById('footer-text').innerText = `© 2026 ${state.data.settings.title} ${state.data.settings.subtitle}. All Rights Reserved.`;

            if (!state.authUser) {
                content.innerHTML = `<div class="flex flex-col justify-center items-center h-64 text-ai"><i class="fa-solid fa-triangle-exclamation text-5xl mb-4 text-torii"></i><p class="text-xl font-bold">資料庫連線失敗，請重新整理頁面。</p></div>`;
                return; 
            }
            
            renderNav();
            
            switch (state.currentPage) {
                case 'home': content.innerHTML = tmplHome(); break;
                case 'works': content.innerHTML = tmplWorks(); break;
                case 'login': content.innerHTML = tmplLogin(); break;
                case 'admin': content.innerHTML = state.currentUser?.role === 'admin' ? tmplAdmin() : tmplWorks(); break;
                case 'student': content.innerHTML = state.currentUser?.role === 'student' ? tmplStudent() : tmplWorks(); break;
                case 'judge': content.innerHTML = state.currentUser?.role === 'judge' ? tmplJudge() : tmplWorks(); break;
                default: content.innerHTML = tmplWorks();
            }
        };

        const renderNav = () => {
            const menu = document.getElementById('nav-menu');
            let html = `
                <button onclick="navigate('works')" class="hover:text-mizu transition px-3 py-1 ${state.currentPage==='works'?'border-b-2 border-mizu text-mizu':''}">作品大廳</button>
                <button onclick="navigate('home')" class="hover:text-mizu transition px-3 py-1 ${state.currentPage==='home'?'border-b-2 border-mizu text-mizu':''}">最新消息</button>
            `;

            if (!state.currentUser) {
                html += `<button onclick="navigate('login')" class="border border-washi hover:bg-washi hover:text-ai transition px-4 py-1 rounded ml-2 text-sm font-bold shadow-sm">登入系統</button>`;
            } else {
                const roleLabels = { admin: '管理系統', student: '學生專區', judge: '評分專區' };
                const rolePage = state.currentUser.role;
                html += `
                    <button onclick="navigate('${rolePage}')" class="text-gold hover:text-washi transition px-2 py-1 ${state.currentPage===rolePage?'border-b-2 border-gold':''}">${roleLabels[rolePage]}</button>
                    <span class="text-sm text-mizu hidden md:inline border-l pl-3 border-gray-500 ml-2">${state.currentUser.name}</span>
                    <button onclick="handleLogout()" class="hover:text-torii transition px-2 py-1 ml-2 text-sm"><i class="fa-solid fa-sign-out-alt"></i> 登出</button>
                `;
            }
            menu.innerHTML = html;
        };

        const tmplHome = () => {
            const newsHtml = state.data.news.sort((a,b) => b.createdAt - a.createdAt).map(n => {
                let attachmentsHtml = '';
                if (n.attachments && n.attachments.length > 0) {
                    attachmentsHtml = `
                        <div class="mt-4 pt-3 border-t border-gray-100 flex flex-wrap gap-2">
                            ${n.attachments.map(att => `
                                <a href="${escapeHtml(att.url)}" target="_blank" class="text-sm border border-gray-300 text-ai hover:bg-gray-100 px-3 py-1 rounded transition shadow-sm bg-white">
                                    <i class="fa-solid fa-link mr-1"></i>${escapeHtml(att.name)}
                                </a>
                            `).join('')}
                        </div>
                    `;
                }

                return `
                <div class="wafu-card p-6 mb-4 relative hover:-translate-y-1 transition duration-300 border-l-4 border-l-ai">
                    <h3 class="text-2xl font-bold mb-1 text-ai">${escapeHtml(n.title)}</h3>
                    <p class="text-xs text-gray-400 mb-3"><i class="fa-regular fa-clock mr-1"></i> ${new Date(n.createdAt).toLocaleDateString('zh-TW')}</p>
                    <div class="text-gray-700 rich-text-content">${n.content}</div>
                    ${attachmentsHtml}
                </div>
            `}).join('') || '<div class="text-center p-10 text-gray-500 bg-white border border-gray-200">目前尚無發佈消息。</div>';

            return `
                <div class="max-w-4xl mx-auto mt-4">
                    <div class="flex items-center mb-6 border-b-2 border-ai pb-2">
                        <i class="fa-solid fa-scroll text-mizu text-3xl mr-3"></i>
                        <h2 class="text-2xl font-bold text-sumi">最新消息</h2>
                    </div>
                    ${newsHtml}
                </div>
            `;
        };

        const tmplWorks = () => {
            window.currentFilterCat = window.currentFilterCat || '';
            const getCatName = (id) => state.data.categories.find(c => c.id === id)?.name || '未分類';
            const getStudentName = (id) => state.data.users.find(u => u.id === id)?.name || '未知學生';
            
            let displayWorks = state.data.works.filter(w => w.isPublic); // 只顯示設定為公開的
            if (window.currentFilterCat) {
                displayWorks = displayWorks.filter(w => w.categoryId === window.currentFilterCat);
            }
            
            const worksHtml = displayWorks.map(w => {
                const displayTitle = `${getCatName(w.categoryId)} - ${getStudentName(w.studentId)}`;
                
                let awardHtml = '';
                if (w.award === '優等') {
                    awardHtml = `<span class="ml-3 text-gold border-2 border-gold px-2 py-1 text-sm font-black shadow-sm bg-[#FFFDF0]"><i class="fa-solid fa-crown text-lg mr-1"></i> 優等</span>`;
                } else if (w.award === '佳作') {
                    awardHtml = `<span class="ml-3 text-ruri border border-ruri px-2 py-1 text-xs font-bold shadow-sm"><i class="fa-solid fa-award mr-1"></i> 佳作</span>`;
                }

                return `
                <div class="wafu-card p-5 flex flex-col justify-between group cursor-pointer border-l-4 border-l-mizu hover:shadow-md transition bg-white" onclick="viewWorkDetail('${w.id}')">
                    <div>
                        <div class="flex justify-between items-start mb-3 border-b border-gray-100 pb-2">
                            <span class="bg-gray-100 text-ai text-xs px-2 py-1 border border-gray-200">${escapeHtml(getCatName(w.categoryId))}</span>
                            <span class="text-gray-400 text-xs"><i class="fa-regular fa-eye text-mizu"></i> ${w.views || 0}</span>
                        </div>
                        <h3 class="text-xl font-bold mb-2 group-hover:text-ruri transition flex items-center flex-wrap gap-2 text-ai">
                            ${escapeHtml(displayTitle)} ${awardHtml}
                        </h3>
                    </div>
                    <div class="pt-4 mt-auto">
                        <span class="text-sm text-gray-500"><i class="fa-solid fa-user-pen mr-1"></i> ${escapeHtml(getStudentName(w.studentId))}</span>
                    </div>
                </div>
            `}).join('') || '<div class="col-span-full text-center py-12 text-gray-500 bg-white border border-gray-200">該分類目前尚無公開作品。</div>';

            const catOptions = state.data.categories.map(c => `<option value="${c.id}" ${window.currentFilterCat === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');

            return `
                <div class="max-w-6xl mx-auto">
                    <div class="flex flex-col sm:flex-row justify-between items-end sm:items-center mb-6 border-b-2 border-ai pb-2">
                        <div class="flex items-center mb-4 sm:mb-0">
                            <i class="fa-solid fa-chess-board text-mizu text-3xl mr-3 opacity-80"></i>
                            <h2 class="text-2xl font-bold text-sumi">競賽作品大廳</h2>
                        </div>
                        <div class="flex items-center space-x-2 bg-white p-2 border border-gray-200 shadow-sm w-full sm:w-auto">
                            <i class="fa-solid fa-filter text-gray-400 ml-2"></i>
                            <span class="text-sm font-bold text-ai whitespace-nowrap">過濾項目：</span>
                            <select onchange="filterWorks(this.value)" class="border-none focus:ring-0 text-sm bg-transparent cursor-pointer py-1 pr-8">
                                <option value="">-- 顯示全部作品 --</option>
                                ${catOptions}
                            </select>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${worksHtml}
                    </div>
                </div>

                <!-- Work Detail Modal -->
                <div id="work-modal" class="fixed inset-0 bg-sumi bg-opacity-70 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
                    <div class="wafu-card w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 relative bg-white border-2 border-ai">
                        <button onclick="closeWorkModal()" class="absolute top-4 right-4 text-gray-400 hover:text-torii text-2xl"><i class="fa-solid fa-times"></i></button>
                        <div id="modal-content"></div>
                    </div>
                </div>
            `;
        };

        const tmplLogin = () => `
            <div class="max-w-md mx-auto mt-12 wafu-card p-8 bg-white border-t-4 border-t-ai">
                <div class="text-center mb-8">
                    <i class="fa-solid fa-fingerprint text-mizu text-4xl mb-3"></i>
                    <h2 class="text-2xl font-bold text-sumi">系統登入</h2>
                    <p class="text-sm text-gray-500 mt-2">請輸入您的帳號與密碼</p>
                </div>
                <form onsubmit="handleLogin(event)" class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-ai mb-1">帳號</label>
                        <input type="text" id="login-username" required class="w-full border border-gray-300 p-2 focus:outline-none focus:border-ruri bg-[#FAF9F6]">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-ai mb-1">密碼</label>
                        <input type="password" id="login-password" required class="w-full border border-gray-300 p-2 focus:outline-none focus:border-ruri bg-[#FAF9F6]">
                    </div>
                    <button type="submit" class="w-full bg-ai text-washi font-bold py-3 hover:bg-ruri transition duration-300 mt-4 shadow-sm">登 入</button>
                </form>
            </div>
        `;

        const tmplAdmin = () => {
            window.currentAdminTab = window.currentAdminTab || 'settings';
            
            const tabClass = (tab) => window.currentAdminTab === tab 
                ? 'bg-ai text-washi px-4 py-2 font-bold text-sm border border-ai' 
                : 'bg-white text-ai border border-gray-300 px-4 py-2 text-sm hover:bg-gray-50 cursor-pointer';

            let tabContent = '';
            
            if (window.currentAdminTab === 'settings') {
                tabContent = `
                    <div class="mb-6 bg-white p-6 border border-gray-200">
                        <h3 class="font-bold mb-4 border-b border-gray-200 pb-2 text-ai"><i class="fa-solid fa-sliders mr-2"></i>網站設定</h3>
                        <form onsubmit="handleSaveSettings(event)" class="space-y-4 max-w-md">
                            <div><label class="block text-sm font-bold mb-1">網站主標題</label><input type="text" id="set-title" value="${escapeHtml(state.data.settings.title)}" required class="w-full border p-2 bg-gray-50 focus:border-ai outline-none"></div>
                            <div><label class="block text-sm font-bold mb-1">網站副標題</label><input type="text" id="set-subtitle" value="${escapeHtml(state.data.settings.subtitle)}" required class="w-full border p-2 bg-gray-50 focus:border-ai outline-none"></div>
                            <button type="submit" class="bg-ai text-washi px-6 py-2 font-bold hover:bg-blue-900 transition shadow-sm">儲存設定</button>
                        </form>
                    </div>
                `;
            } else if (window.currentAdminTab === 'users') {
                const catOptions = state.data.categories.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
                
                const usersHtml = state.data.users.map(u => `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 font-bold">${escapeHtml(u.name)}</td>
                        <td class="p-3">${escapeHtml(u.username)}</td>
                        <td class="p-3">
                            <span class="px-2 py-1 text-xs rounded border ${u.role==='admin'?'bg-red-50 border-torii text-torii':u.role==='judge'?'bg-blue-50 border-ruri text-ruri':'bg-gray-100 border-gray-400 text-gray-700'}">${u.role === 'admin' ? '管理員' : u.role === 'judge' ? '評審' : '學生'}</span>
                        </td>
                        <td class="p-3">
                            ${u.role==='judge' ? `
                                <select onchange="updateJudgeCategory('${u.id}', this.value)" class="text-sm border p-1 bg-white">
                                    <option value="">-- 評分全部 --</option>
                                    ${state.data.categories.map(c => `<option value="${c.id}" ${u.assignedCategoryId===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join('')}
                                </select>
                            ` : '-'}
                        </td>
                        <td class="p-3 text-sm text-gray-500">${u.password}</td>
                        <td class="p-3 text-right">
                            <button onclick="deleteDocHandler('users', '${u.id}')" class="text-torii hover:text-red-800 bg-red-50 px-2 py-1 rounded border border-red-100" ${u.username === 'admin' ? 'disabled style="opacity:0.3"' : ''}><i class="fa-solid fa-trash"></i> 刪除</button>
                        </td>
                    </tr>
                `).join('');
                tabContent = `
                    <div class="mb-6 bg-white p-4 border border-gray-200">
                        <h3 class="font-bold mb-3 border-b border-gray-100 pb-2 text-ai"><i class="fa-solid fa-user-plus mr-2"></i>單筆新增帳號</h3>
                        <form onsubmit="handleAddUser(event)" class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
                            <div><label class="block text-sm mb-1 font-bold">姓名</label><input type="text" id="add-u-name" required class="w-full border p-2 bg-gray-50 focus:border-ai outline-none"></div>
                            <div><label class="block text-sm mb-1 font-bold">帳號</label><input type="text" id="add-u-username" required class="w-full border p-2 bg-gray-50 focus:border-ai outline-none"></div>
                            <div><label class="block text-sm mb-1 font-bold">密碼</label><input type="text" id="add-u-pwd" required class="w-full border p-2 bg-gray-50 focus:border-ai outline-none"></div>
                            <div><label class="block text-sm mb-1 font-bold">角色</label>

                            </thead>
                            <tbody>
                                ${judgeWorksHtml || '<tr><td colspan="3" class="text-center p-8 text-gray-500 bg-gray-50">尚無作品可評分。</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
             `;
        };

        window.switchAdminTab = (tab) => { window.currentAdminTab = tab; render(); };

        window.handleSaveSettings = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            try {
                const title = document.getElementById('set-title').value.trim();
                const subtitle = document.getElementById('set-subtitle').value.trim();
                
                if (state.data.settings.id) {
                    await updateDoc(getDocRef('settings', state.data.settings.id), { title, subtitle });
                } else {
                    await addDoc(getCollectionRef('settings'), { title, subtitle });
                }
                showToast('網站設定已儲存');
            } catch (err) { console.error(err); showToast('儲存失敗', 'error'); }
        };

        window.handleLogin = (e) => {
            e.preventDefault();
            const un = document.getElementById('login-username').value.trim();
            const pw = document.getElementById('login-password').value;
            
            const user = state.data.users.find(u => u.username === un && u.password === pw);
            if (user) {
                state.currentUser = user;
                showToast(`登入成功，歡迎 ${user.name}`);
                navigate(user.role === 'admin' ? 'admin' : (user.role === 'judge' ? 'judge' : 'student')); 
            } else {
                showToast('帳號或密碼錯誤', 'error');
            }
        };

        window.handleLogout = () => {
            state.currentUser = null;
            showToast('已登出');
            navigate('works');
        };

        window.handleAddUser = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            const data = {
                name: document.getElementById('add-u-name').value.trim(),
                username: document.getElementById('add-u-username').value.trim(),
                password: document.getElementById('add-u-pwd').value,
                role: document.getElementById('add-u-role').value,
                createdAt: Date.now()
            };

            if (state.data.users.some(u => u.username === data.username)) {
                showToast('帳號已存在', 'error');
                return;
            }
            try {
                await addDoc(getCollectionRef('users'), data);
                showToast('帳號新增成功');
                e.target.reset();
            } catch (err) { console.error(err); showToast('新增失敗', 'error'); }
        };

        window.updateJudgeCategory = async (userId, catId) => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            try {
                await updateDoc(getDocRef('users', userId), { assignedCategoryId: catId || null });
                showToast('評審指派已更新');
            } catch (err) { console.error(err); showToast('更新失敗', 'error'); }
        };

        window.handleBulkImport = async () => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            const text = document.getElementById('bulk-students').value.trim();
            if (!text) { showToast('請輸入匯入資料', 'error'); return; }
            
            const lines = text.split('\n');
            let successCount = 0; let skipCount = 0;
            
            showToast('資料匯入中...');
            for (let line of lines) {
                const parts = line.split(',').map(s => s.trim());
                if (parts.length >= 3) {
                    const [name, username, password] = parts;
                    if (name && username && password) {
                        if (!state.data.users.some(u => u.username === username)) {
                            try {
                                await addDoc(getCollectionRef('users'), { name, username, password, role: 'student', createdAt: Date.now() });
                                successCount++;
                            } catch(e) { console.error(e); skipCount++; }
                        } else { skipCount++; }
                    }
                }
            }
            showToast(`匯入完成！成功：${successCount}，略過：${skipCount}`);
            document.getElementById('bulk-students').value = '';
        };

        window.handleAddCategory = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            try {
                await addDoc(getCollectionRef('categories'), {
                    name: document.getElementById('add-c-name').value.trim(),
                    description: document.getElementById('add-c-desc').value.trim(),
                    createdAt: Date.now()
                });
                showToast('項目新增成功');
                e.target.reset();
            } catch (err) { console.error(err); showToast('新增失敗', 'error'); }
        };

        window.handleEditCategory = async (id, oldName, oldDesc) => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            const newName = prompt("新項目名稱:", oldName);
            if (newName === null || newName.trim() === '') return; 
            const newDesc = prompt("新說明:", oldDesc);
            try {
                await updateDoc(getDocRef('categories', id), { name: newName.trim(), description: newDesc !== null ? newDesc.trim() : oldDesc });
                showToast('修改成功');
            } catch (err) { console.error(err); showToast('修改失敗', 'error'); }
        };

        window.addLinkField = () => {
            const container = document.getElementById('links-container');
            const div = document.createElement('div');
            div.className = 'flex space-x-2';
            div.innerHTML = `
                <input type="text" placeholder="按鈕名稱" class="link-name w-1/3 border border-gray-300 p-2 text-sm bg-gray-50 focus:border-ai outline-none rounded">
                <input type="url" placeholder="網址 (https://...)" class="link-url w-full border border-gray-300 p-2 text-sm bg-gray-50 focus:border-ai outline-none rounded">
                <button type="button" onclick="this.parentElement.remove()" class="bg-gray-300 text-gray-700 px-3 py-2 rounded hover:bg-gray-400 transition"><i class="fa-solid fa-times"></i></button>
            `;
            container.appendChild(div);
        };

        window.handleAddNews = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            
            const title = document.getElementById('add-n-title').value.trim();
            const content = document.getElementById('add-n-content').innerHTML;

            const linkNames = document.querySelectorAll('.link-name');
            const linkUrls = document.querySelectorAll('.link-url');
            const attachments = [];
            
            for (let i = 0; i < linkNames.length; i++) {
                const n = linkNames[i].value.trim();
                const u = linkUrls[i].value.trim();
                if (n && u) attachments.push({ name: n, url: u });
            }

            try {
                await addDoc(getCollectionRef('news'), { title, content, attachments, createdAt: Date.now() });
                showToast('公告發佈成功');
                e.target.reset();
                document.getElementById('add-n-content').innerHTML = '';
                document.getElementById('links-container').innerHTML = '';
            } catch (err) { console.error(err); showToast('發佈失敗', 'error'); }
        };

        window.openEditNewsModal = (id) => {
            const news = state.data.news.find(n => n.id === id);
            if (!news) return;

            document.getElementById('edit-n-id').value = id;
            document.getElementById('edit-n-title').value = news.title;
            document.getElementById('edit-n-content').innerHTML = news.content;

            const container = document.getElementById('edit-n-links-container');
            container.innerHTML = '';
            if (news.attachments && news.attachments.length > 0) {
                news.attachments.forEach(att => addEditLinkField(att.name, att.url));
            }
            
            document.getElementById('edit-news-modal').classList.remove('hidden');
        };

        window.closeEditNewsModal = () => {
            document.getElementById('edit-news-modal').classList.add('hidden');
        };

        window.addEditLinkField = (name = '', url = '') => {
            const container = document.getElementById('edit-n-links-container');
            const div = document.createElement('div');
            div.className = 'flex space-x-2';
            div.innerHTML = `
                <input type="text" placeholder="按鈕名稱" value="${escapeHtml(name)}" class="edit-link-name w-1/3 border border-gray-300 p-2 text-sm bg-gray-50 focus:border-ai outline-none rounded">
                <input type="url" placeholder="網址 (https://...)" value="${escapeHtml(url)}" class="edit-link-url w-full border border-gray-300 p-2 text-sm bg-gray-50 focus:border-ai outline-none rounded">
                <button type="button" onclick="this.parentElement.remove()" class="bg-gray-300 text-gray-700 px-3 py-2 rounded hover:bg-gray-400 transition"><i class="fa-solid fa-times"></i></button>
            `;
            container.appendChild(div);
        };

        window.submitEditNews = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'admin') return;

            const id = document.getElementById('edit-n-id').value;
            const title = document.getElementById('edit-n-title').value.trim();
            const content = document.getElementById('edit-n-content').innerHTML;

            const linkNames = document.querySelectorAll('.edit-link-name');
            const linkUrls = document.querySelectorAll('.edit-link-url');
            const attachments = [];
            for (let i = 0; i < linkNames.length; i++) {
                const n = linkNames[i].value.trim();
                const u = linkUrls[i].value.trim();
                if (n && u) attachments.push({ name: n, url: u });
            }

            try {
                await updateDoc(getDocRef('news', id), { title, content, attachments });
                showToast('公告修改成功');
                closeEditNewsModal();
            } catch (err) { console.error(err); showToast('修改失敗', 'error'); }
        };

        window.handleUploadWork = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'student') return;
            try {
                await addDoc(getCollectionRef('works'), {
                    studentId: state.currentUser.id,
                    categoryId: document.getElementById('up-category').value,
                    driveLink: document.getElementById('up-link').value.trim(),
                    views: 0, scores: {}, award: '', isPublic: false, createdAt: Date.now()
                });
                showToast('作品上傳成功');
                e.target.reset();
            } catch (err) { console.error(err); showToast('上傳失敗', 'error'); }
        };

        window.handleScore = async (workId) => {
            if (!state.authUser || state.currentUser?.role !== 'judge') return;
            const scoreNum = parseInt(document.getElementById(`score-${workId}`).value);
            if (isNaN(scoreNum) || scoreNum < 0 || scoreNum > 100) { showToast('請輸入0-100', 'error'); return; }
            try {
                const workRef = getDocRef('works', workId);
                const work = state.data.works.find(w => w.id === workId);
                const currentScores = work.scores || {};
                currentScores[state.currentUser.id] = scoreNum;
                await updateDoc(workRef, { scores: currentScores });
                showToast('評分儲存成功');
            } catch (err) { console.error(err); showToast('儲存失敗', 'error'); }
        };

        window.updateWorkAward = async (workId, awardVal) => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            try {
                await updateDoc(getDocRef('works', workId), { award: awardVal });
                showToast('獎項已更新');
            } catch(e) { console.error(e); showToast('更新失敗', 'error'); }
        };

        window.updateWorkVisibility = async (workId, isChecked) => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            try {
                await updateDoc(getDocRef('works', workId), { isPublic: isChecked });
                showToast(isChecked ? '作品已設為公開' : '作品已取消公開');
            } catch(e) { console.error(e); showToast('更新失敗', 'error'); }
        };

        window.exportScoresToCSV = () => {
            const getCatName = (id) => state.data.categories.find(c => c.id === id)?.name || '未分類';
            const getStudentName = (id) => state.data.users.find(u => u.id === id)?.name || '未知學生';
            
            let csvContent = '\uFEFF'; // BOM for Excel UTF-8
            csvContent += "比賽項目,參賽學生,平均分數,獎項,是否公開,雲端連結\n";
            
            state.data.works.forEach(w => {
                let totalScore = 0; let count = 0;
                if(w.scores) { Object.values(w.scores).forEach(s => { totalScore += s; count++; }); }
                const avgScore = count > 0 ? (totalScore/count).toFixed(1) : '0';
                
                const row = [
                    `"${getCatName(w.categoryId)}"`, `"${getStudentName(w.studentId)}"`, avgScore, `"${w.award || ''}"`, w.isPublic ? '是' : '否', `"${w.driveLink}"`
                ];
                csvContent += row.join(",") + "\n";
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "競賽成績匯出.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        window.filterWorks = (catId) => { window.currentFilterCat = catId; render(); };

        window.deleteDocHandler = async (colName, docId) => {
            if (!state.authUser) return;
            if(confirm("確定要刪除嗎？此操作無法還原。")) {
                try {
                    await deleteDoc(getDocRef(colName, docId));
                    showToast('資料已刪除');
                } catch (err) { console.error(err); showToast('刪除失敗', 'error'); }
            }
        };

        window.viewWorkDetail = async (workId) => {
            const work = state.data.works.find(w => w.id === workId);
            if (!work) return;

            try {
                if(state.authUser) { await updateDoc(getDocRef('works', workId), { views: (work.views || 0) + 1 }); }
            } catch (e) { console.error(e); }

            const catName = state.data.categories.find(c=>c.id===work.categoryId)?.name || '未知';
            const studentName = state.data.users.find(u=>u.id===work.studentId)?.name || '未知學生';
            const displayTitle = `${catName} - ${studentName}`;
            
            let awardHtml = '';
            if (work.award === '優等') {
                awardHtml = `<div class="mb-4 inline-block text-gold border-2 border-gold px-4 py-2 text-lg font-black bg-[#FFFDF0]"><i class="fa-solid fa-crown mr-2"></i>優等</div>`;
            } else if (work.award === '佳作') {
                awardHtml = `<div class="mb-4 inline-block text-ruri border border-ruri px-3 py-1 font-bold"><i class="fa-solid fa-award mr-1"></i>佳作</div>`;
            }

            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = `
                <div class="text-center mb-6 border-b border-gray-100 pb-6">
                    ${awardHtml}
                    <h2 class="text-3xl font-bold text-ai mb-4">${escapeHtml(displayTitle)}</h2>
                    <div class="text-gray-500 font-bold space-x-4">
                        <span><i class="fa-solid fa-user-pen mr-1"></i> ${escapeHtml(studentName)}</span>
                        <span>|</span>
                        <span><i class="fa-regular fa-eye mr-1"></i> ${(work.views || 0) + 1} 次觀看</span>
                    </div>
                </div>
                <div class="text-center mt-6">
                    <a href="${escapeHtml(work.driveLink)}" target="_blank" class="bg-ai text-washi px-8 py-3 font-bold hover:bg-ruri transition shadow-sm inline-block">
                        <i class="fa-brands fa-google-drive mr-2"></i>開啟完整作品檔案
                    </a>
                </div>
            `;
            document.getElementById('work-modal').classList.remove('hidden');
        };

        window.closeWorkModal = () => { document.getElementById('work-modal').classList.add('hidden'); };

        const escapeHtml = (unsafe) => {
            if(!unsafe) return '';
            return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        };

        window.confirm = (msg) => {
            try { return window.top.confirm(msg); } catch(e) { return true; }
        }

        initAuth();

    </script>
</body>
</html>

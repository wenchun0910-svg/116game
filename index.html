<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫻花盃 國小資訊應用競賽</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: M PLUS Rounded 1c for a handwritten chalk feel -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'chalk-bg': '#2F3E46',      /* 黑板深綠灰 */
                        'chalk-board': '#253238',   /* 黑板底色 */
                        'chalk-white': '#F4F4F0',   /* 粉筆白 */
                        'chalk-yellow': '#F9E79F',  /* 粉筆黃 */
                        'chalk-green': '#82E0AA',   /* 粉筆綠 */
                        'chalk-blue': '#85C1E9',    /* 粉筆藍 */
                        'chalk-pink': '#FF9CA1',    /* 粉筆粉紅 */
                        'chalk-purple': '#D2B4DE',  /* 粉筆紫 */
                        'chalk-orange': '#F5CBA7',  /* 粉筆橘 */
                        'wood-light': '#C19A6B',    /* 木頭亮部 */
                        'wood-dark': '#8B5A2B'      /* 木頭暗部 */
                    },
                    fontFamily: {
                        'chalk': ['"M PLUS Rounded 1c"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #2F3E46; 
            color: #F4F4F0; 
            /* 黑板雜訊材質背景 */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E");
            font-family: '"M PLUS Rounded 1c"', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 手繪粉筆框卡片 */
        .chalk-card {
            background-color: rgba(37, 50, 56, 0.7);
            border: 2px dashed rgba(244, 244, 240, 0.4);
            border-radius: 12px;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }
        .chalk-card:hover {
            border-color: #F9E79F;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }

        /* 手繪風按鈕 */
        .chalk-btn {
            background: transparent;
            border: 2px solid currentColor;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; /* 模擬手繪不規則圓角 */
            font-weight: 900;
            transition: all 0.2s;
            cursor: pointer;
        }
        .chalk-btn:hover {
            background: currentColor;
            color: #2F3E46 !important; /* 變回底色 */
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .chalk-btn-white { color: #F4F4F0; }
        .chalk-btn-yellow { color: #F9E79F; }
        .chalk-btn-green { color: #82E0AA; }
        .chalk-btn-blue { color: #85C1E9; }
        .chalk-btn-pink { color: #FF9CA1; }

        /* 輸入框樣式 (深色底色，白字) */
        .chalk-input {
            background-color: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(244, 244, 240, 0.3);
            border-radius: 8px;
            color: #F4F4F0;
            padding: 10px 14px;
            transition: all 0.2s;
        }
        .chalk-input:focus {
            outline: none;
            border-color: #85C1E9;
            background-color: rgba(0, 0, 0, 0.4);
        }
        .chalk-input::placeholder { color: rgba(244, 244, 240, 0.4); }
        
        /* 下拉選單特別處理：強制所有選項為黑板深底，避免瀏覽器預設白底吃掉淺色字 */
        select option {
            background-color: #2F3E46;
            color: #F4F4F0;
        }

        /* 木頭板溝槽 (Footer) */
        .wood-ledge {
            background: linear-gradient(to bottom, #C19A6B, #8B5A2B);
            border-top: 3px solid #D4A373;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.2), 0 -4px 10px rgba(0,0,0,0.4);
        }
        
        /* 標題粉筆效果 */
        .chalk-text-shadow {
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5), 0 0 10px rgba(255,255,255,0.2);
        }

        /* Toast Animation */
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast-leave { transform: translateY(0); opacity: 1; }
        .toast-leave-active { transform: translateY(100%); opacity: 0; transition: all 0.3s ease-in; }
        
        /* 表格樣式覆寫 */
        table { border-collapse: separate; border-spacing: 0; }
        th, td { border-bottom: 1px dashed rgba(244,244,240,0.2); }
        tr:last-child td { border-bottom: none; }
        
        /* 富文本編輯器內容 */
        .rich-text-content p { margin-bottom: 0.25rem; line-height: 1.5; }
        .rich-text-content a { color: #85C1E9; text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="bg-chalk-board/80 backdrop-blur-sm border-b-2 border-dashed border-chalk-white/30 sticky top-0 z-40 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <!-- Logo -->
                <div class="flex items-center cursor-pointer transform hover:scale-105 transition" onclick="navigate('works')">
                    <i class="fa-solid fa-chalkboard text-chalk-yellow text-3xl mr-3 chalk-text-shadow"></i>
                    <span class="font-black text-2xl tracking-wide text-chalk-white chalk-text-shadow" id="nav-site-title">資訊應用競賽</span>
                    <span class="text-sm ml-3 hidden sm:inline border-l-2 border-chalk-white/30 pl-3 text-chalk-white/70" id="nav-site-subtitle"></span>
                </div>
                <!-- Menu -->
                <div class="flex items-center space-x-3 sm:space-x-4" id="nav-menu">
                    <!-- Nav items injected by JS -->
                </div>
            </div>
        </div>
        <!-- 裝飾用粉筆線條 -->
        <div class="h-1 w-full bg-gradient-to-r from-chalk-pink via-chalk-yellow to-chalk-blue opacity-50"></div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" id="app-content">
        <div class="flex flex-col justify-center items-center h-64 text-chalk-white">
            <i class="fa-solid fa-circle-notch fa-spin text-5xl text-chalk-yellow mb-4"></i>
            <h2 class="text-xl font-bold tracking-widest">黑板擦拭中...</h2>
        </div>
    </main>

    <!-- Footer (Wood Ledge) -->
    <footer class="wood-ledge text-chalk-white py-4 mt-auto relative">
        <!-- 裝飾用掉落的粉筆 -->
        <div class="absolute bottom-2 left-10 w-8 h-2 bg-chalk-pink rounded-full shadow-lg transform -rotate-12 opacity-80"></div>
        <div class="absolute bottom-1 left-24 w-10 h-2 bg-chalk-blue rounded-full shadow-lg transform rotate-6 opacity-80"></div>
        <div class="absolute bottom-3 right-16 w-6 h-2 bg-chalk-yellow rounded-full shadow-lg transform -rotate-45 opacity-80"></div>
        
        <div class="text-center relative z-10">
            <p id="footer-text" class="font-bold text-sm tracking-widest text-white drop-shadow-md">© 2026 資訊應用競賽系統. All Rights Reserved.</p>
            <p class="text-white/60 mt-1 text-xs">Classroom Chalkboard Edition</p>
        </div>
    </footer>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-16 right-6 z-50 flex flex-col space-y-3"></div>

    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

            const firebaseConfig = {
  apiKey: "AIzaSyB6NgZNLvexXfKwkW5eP4tNnkSHwuY8KyM",
  authDomain: "contactbook-c6d95.firebaseapp.com",
  projectId: "contactbook-c6d95",
  storageBucket: "contactbook-c6d95.firebasestorage.app",
  messagingSenderId: "655576113880",
  appId: "1:655576113880:web:15606f5cad291d8aca6dad"
};

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const state = {
            currentPage: 'works', // 預設首頁為作品大廳
            currentUser: null, 
            authUser: null, 
            data: {
                news: [],
                categories: [],
                works: [],
                users: [],
                settings: { title: '櫻花盃', subtitle: '國小資訊應用競賽' }
            },
            unsubscribes: []
        };

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            // Toast style matches chalkboard theme
            const colorClass = type === 'success' ? 'text-chalk-green' : 'text-chalk-pink';
            const icon = type === 'success' ? 'fa-check' : 'fa-xmark';
            
            toast.className = `chalk-card px-6 py-4 font-bold flex items-center space-x-3 toast-enter text-lg shadow-xl ${colorClass} border-${type==='success'?'chalk-green':'chalk-pink'}`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-2xl"></i><span class="text-chalk-white">${message}</span>`;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-enter-active');
            });

            setTimeout(() => {
                toast.classList.remove('toast-enter-active');
                toast.classList.add('toast-leave-active');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        window.navigate = (page) => {
            state.currentPage = page;
            render();
        };

        const getCollectionRef = (colName) => collection(db, 'artifacts', appId, 'public', 'data', colName);
        const getDocRef = (colName, docId) => doc(db, 'artifacts', appId, 'public', 'data', colName, docId);

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                showToast("連線發生錯誤 🔌", "error");
                render(); 
            }
        };

        onAuthStateChanged(auth, async (user) => {
            state.authUser = user;
            if (user) {
                setupRealtimeListeners();
                render(); 
            } else {
                cleanupListeners();
                render(); 
            }
        });

        const setupRealtimeListeners = () => {
            cleanupListeners(); 
            const collections = ['news', 'categories', 'works', 'users', 'settings'];
            
            collections.forEach(col => {
                const unsubscribe = onSnapshot(getCollectionRef(col), (snapshot) => {
                    if (col === 'settings') {
                        if (!snapshot.empty) {
                            state.data.settings = snapshot.docs[0].data();
                            state.data.settings.id = snapshot.docs[0].id;
                        }
                    } else {
                        state.data[col] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    }
                    
                    if (col === 'users' && state.data.users.length === 0) {
                        createDefaultAdmin();
                    }
                    
                    if (col === 'users' && state.currentUser) {
                        const updatedMe = state.data.users.find(u => u.id === state.currentUser.id);
                        if (!updatedMe) {
                            window.handleLogout();
                            showToast("帳號已被移除", "error");
                        } else {
                            state.currentUser = updatedMe; 
                        }
                    }
                    render();
                }, (error) => {
                    console.error(`Error listening to ${col}:`, error);
                    showToast(`無法讀取資料 (${col}) 😥`, "error");
                });
                state.unsubscribes.push(unsubscribe);
            });
        };

        const cleanupListeners = () => {
            state.unsubscribes.forEach(unsub => unsub());
            state.unsubscribes = [];
        };

        const createDefaultAdmin = async () => {
            try {
                await addDoc(getCollectionRef('users'), {
                    username: 'admin',
                    password: 'admin123',
                    name: '系統管理員',
                    role: 'admin',
                    createdAt: Date.now()
                });
            } catch (e) { console.error(e); }
        };

        const render = () => {
            const content = document.getElementById('app-content');
            
            // 更新網站設定的標題
            document.title = `${state.data.settings.title} | ${state.data.settings.subtitle}`;
            document.getElementById('nav-site-title').innerHTML = escapeHtml(state.data.settings.title);
            document.getElementById('nav-site-subtitle').innerHTML = escapeHtml(state.data.settings.subtitle);
            document.getElementById('footer-text').innerText = `© 2026 ${state.data.settings.title} ${state.data.settings.subtitle}. All Rights Reserved.`;

            if (!state.authUser) {
                content.innerHTML = `
                    <div class="flex flex-col justify-center items-center h-64 text-chalk-white chalk-card p-10 max-w-lg mx-auto mt-10 text-center border-chalk-pink">
                        <i class="fa-solid fa-plug-circle-xmark text-5xl text-chalk-pink mb-4"></i>
                        <h2 class="text-2xl font-black mb-2">網路連線中斷</h2>
                        <p class="text-chalk-white/70">請重新整理黑板 (網頁) 試試看！🔄</p>
                    </div>`;
                return; 
            }
            
            renderNav();
            
            switch (state.currentPage) {
                case 'home': content.innerHTML = tmplHome(); break;
                case 'works': content.innerHTML = tmplWorks(); break;
                case 'login': content.innerHTML = tmplLogin(); break;
                case 'admin': content.innerHTML = state.currentUser?.role === 'admin' ? tmplAdmin() : tmplWorks(); break;
                case 'student': content.innerHTML = state.currentUser?.role === 'student' ? tmplStudent() : tmplWorks(); break;
                case 'judge': content.innerHTML = state.currentUser?.role === 'judge' ? tmplJudge() : tmplWorks(); break;
                default: content.innerHTML = tmplWorks();
            }
        };

        const renderNav = () => {
            const menu = document.getElementById('nav-menu');
            let html = `
                <button onclick="navigate('works')" class="chalk-btn ${state.currentPage==='works'?'chalk-btn-yellow bg-chalk-yellow/10':'chalk-btn-white hover:bg-chalk-white/10'} px-4 py-2 text-sm sm:text-base hidden sm:inline-block">作品大廳</button>
                <button onclick="navigate('home')" class="chalk-btn ${state.currentPage==='home'?'chalk-btn-green bg-chalk-green/10':'chalk-btn-white hover:bg-chalk-white/10'} px-4 py-2 text-sm sm:text-base">最新消息</button>
            `;

            if (!state.currentUser) {
                html += `<button onclick="navigate('login')" class="chalk-btn chalk-btn-blue hover:bg-chalk-blue/10 px-5 py-2 text-sm sm:text-base ml-2">登入系統</button>`;
            } else {
                const roleLabels = { admin: '管理系統', student: '學生專區', judge: '評分專區' };
                const rolePage = state.currentUser.role;
                const roleColors = { admin: 'chalk-btn-pink', student: 'chalk-btn-green', judge: 'chalk-btn-purple' };
                const cColor = roleColors[rolePage];

                html += `
                    <button onclick="navigate('${rolePage}')" class="chalk-btn ${cColor} hover:bg-white/10 px-4 py-2 text-sm sm:text-base ml-2">${roleLabels[rolePage]}</button>
                    <span class="text-sm font-black text-chalk-white hidden md:inline ml-3 px-3 py-1 border border-dashed border-chalk-white/30 rounded-full">${state.currentUser.name}</span>
                    <button onclick="handleLogout()" class="text-chalk-white/50 hover:text-chalk-pink transition px-3 py-2 text-xl ml-1" title="登出"><i class="fa-solid fa-right-from-bracket"></i></button>
                `;
            }
            menu.innerHTML = html;
        };

        /* ================== 作品大廳 (Works) ================== */
        const tmplWorks = () => {
            window.currentFilterCat = window.currentFilterCat || '';
            const getCatName = (id) => state.data.categories.find(c => c.id === id)?.name || '未分類';
            const getStudentName = (id) => state.data.users.find(u => u.id === id)?.name || '未知同學';
            
            let displayWorks = state.data.works.filter(w => w.isPublic); 
            if (window.currentFilterCat) {
                displayWorks = displayWorks.filter(w => w.categoryId === window.currentFilterCat);
            }
            
            const worksHtml = displayWorks.map(w => {
                const displayTitle = `${getCatName(w.categoryId)} - ${getStudentName(w.studentId)}`;
                
                let awardHtml = '';
                if (w.award === '優等') {
                    awardHtml = `<span class="ml-2 text-chalk-yellow border border-chalk-yellow px-2 py-0.5 rounded-full text-sm font-black bg-chalk-yellow/10 shadow-sm"><i class="fa-solid fa-crown text-lg mr-1 mb-1"></i>優等</span>`;
                } else if (w.award === '佳作') {
                    awardHtml = `<span class="ml-2 text-chalk-blue border border-chalk-blue px-2 py-0.5 rounded-full text-xs font-bold bg-chalk-blue/10"><i class="fa-solid fa-medal mr-1"></i>佳作</span>`;
                }

                return `
                <div class="chalk-card p-6 flex flex-col justify-between cursor-pointer border-l-4 border-l-chalk-blue hover:border-l-chalk-yellow" onclick="viewWorkDetail('${w.id}')">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-chalk-dark font-black text-xs px-2 py-1 rounded bg-chalk-white/20 text-chalk-white">${escapeHtml(getCatName(w.categoryId))}</span>
                            <span class="text-chalk-white/60 text-xs font-bold"><i class="fa-regular fa-eye"></i> ${w.views || 0}</span>
                        </div>
                        <h3 class="text-xl font-bold mb-2 text-chalk-white group-hover:text-chalk-yellow transition flex items-center flex-wrap gap-2">
                            ${escapeHtml(displayTitle)} ${awardHtml}
                        </h3>
                    </div>
                    <div class="pt-4 mt-auto border-t border-dashed border-chalk-white/20">
                        <span class="text-sm font-bold text-chalk-white/80"><i class="fa-solid fa-user-pen text-chalk-green mr-1"></i> ${escapeHtml(getStudentName(w.studentId))}</span>
                    </div>
                </div>
            `}).join('') || `
                <div class="col-span-full text-center py-16 chalk-card border-chalk-white/20">
                    <i class="fa-solid fa-box-open text-6xl text-chalk-white/20 mb-4"></i>
                    <p class="text-chalk-white/60 font-bold text-lg">黑板上目前還沒有公開的作品喔！</p>
                </div>`;

            const catOptions = state.data.categories.map(c => `<option value="${c.id}" ${window.currentFilterCat === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');

            return `
                <div class="max-w-6xl mx-auto">
                    <div class="flex flex-col sm:flex-row justify-between items-end sm:items-center mb-8 pb-4 border-b border-dashed border-chalk-white/30">
                        <div class="flex items-center mb-4 sm:mb-0">
                            <i class="fa-solid fa-palette text-chalk-pink text-4xl mr-3 transform -rotate-12"></i>
                            <h2 class="text-3xl font-black text-chalk-white chalk-text-shadow">競賽作品大廳</h2>
                        </div>
                        <div class="flex items-center chalk-input w-full sm:w-auto">
                            <i class="fa-solid fa-filter text-chalk-blue mr-2"></i>
                            <span class="text-sm font-bold text-chalk-white/80 mr-2 whitespace-nowrap">篩選項目：</span>
                            <select onchange="filterWorks(this.value)" class="bg-transparent border-none focus:ring-0 text-sm font-bold text-chalk-yellow outline-none cursor-pointer">
                                <option value="" class="bg-chalk-bg">-- 顯示全部作品 --</option>
                                ${catOptions}
                            </select>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${worksHtml}
                    </div>
                </div>

                <!-- Work Detail Modal -->
                <div id="work-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
                    <div class="chalk-card w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 relative border-t-8 border-t-chalk-yellow bg-chalk-board">
                        <button onclick="closeWorkModal()" class="absolute top-4 right-4 text-chalk-white/50 hover:text-chalk-pink text-2xl transition"><i class="fa-solid fa-xmark"></i></button>
                        <div id="modal-content"></div>
                    </div>
                </div>
            `;
        };

        /* ================== 最新消息 (News) ================== */
        const tmplHome = () => {
            const newsHtml = state.data.news.sort((a,b) => b.createdAt - a.createdAt).map(n => `
                <div class="border-b border-dashed border-chalk-white/20 py-4 flex flex-col sm:flex-row sm:items-center justify-between group cursor-pointer hover:bg-chalk-white/5 px-3 rounded-lg transition" onclick="viewNewsDetail('${n.id}')">
                    <div class="flex-grow">
                        <h3 class="text-lg font-bold text-chalk-white group-hover:text-chalk-yellow transition flex items-center">
                            <i class="fa-solid fa-angle-right text-chalk-pink mr-2 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                            ${escapeHtml(n.title)}
                        </h3>
                    </div>
                    <div class="mt-2 sm:mt-0 flex-shrink-0 text-sm font-bold text-chalk-white/50">
                        <i class="fa-regular fa-clock mr-1"></i> ${new Date(n.createdAt).toLocaleDateString('zh-TW')}
                    </div>
                </div>
            `).join('') || `
                <div class="text-center p-12 chalk-card border-chalk-white/20 border-none shadow-none">
                    <i class="fa-regular fa-bell-slash text-5xl text-chalk-white/20 mb-3"></i>
                    <p class="text-chalk-white/50 font-bold">目前沒有任何廣播消息喔！</p>
                </div>`;

            return `
                <div class="max-w-4xl mx-auto mt-4">
                    <div class="flex items-center mb-6 pb-2 border-b border-dashed border-chalk-white/30">

        /* ================== Actions & Handlers ================== */

        window.switchAdminTab = (tab) => { window.currentAdminTab = tab; render(); };

        window.handleSaveSettings = async (e) => {
            e.preventDefault();

            try {
                const title = document.getElementById('set-title').value.trim();
                const subtitle = document.getElementById('set-subtitle').value.trim();
                
                if (state.data.settings.id) {
                    await updateDoc(getDocRef('settings', state.data.settings.id), { title, subtitle });
                } else {
                    await addDoc(getCollectionRef('settings'), { title, subtitle });
                }
                showToast('黑板設定已儲存！');
            } catch (err) { console.error(err); showToast('儲存失敗', 'error'); }
        };

        window.handleLogin = (e) => {
            e.preventDefault();
            const un = document.getElementById('login-username').value.trim();
            const pw = document.getElementById('login-password').value;
            
            const user = state.data.users.find(u => u.username === un && u.password === pw);
            if (user) {
                state.currentUser = user;
                showToast(`登入成功！歡迎回來，${user.name}`);
                navigate(user.role); 
            } else {
                showToast('帳號或密碼寫錯囉，擦掉重寫！', 'error');
            }
        };

        window.handleLogout = () => {
            state.currentUser = null;
            showToast('已離開教室 (登出)');
            navigate('works');
        };

        window.handleAddUser = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            const data = {
                name: document.getElementById('add-u-name').value.trim(),
                username: document.getElementById('add-u-username').value.trim(),
                password: document.getElementById('add-u-pwd').value,
                role: document.getElementById('add-u-role').value,
                createdAt: Date.now()
            };

            if (state.data.users.some(u => u.username === data.username)) {
                showToast('名冊上已經有這個帳號囉', 'error');
                return;
            }
            try {
                await addDoc(getCollectionRef('users'), data);
                showToast('寫入名冊成功！');
                e.target.reset();
            } catch (err) { console.error(err); showToast('新增失敗', 'error'); }
        };

        window.updateJudgeCategory = async (userId, catId) => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            try {
                await updateDoc(getDocRef('users', userId), { assignedCategoryId: catId || null });
                showToast('評審任務指派成功！');
            } catch (err) { console.error(err); showToast('更新失敗', 'error'); }
        };

        window.handleBulkImport = async () => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            const text = document.getElementById('bulk-students').value.trim();
            if (!text) { showToast('黑板空空的，請輸入資料', 'error'); return; }
            
            const lines = text.split('\n');
            let successCount = 0; let skipCount = 0;
            
            showToast('開始抄寫名單...');
            for (let line of lines) {
                const parts = line.split(',').map(s => s.trim());
                if (parts.length >= 3) {
                    const [name, username, password] = parts;
                    if (name && username && password) {
                        if (!state.data.users.some(u => u.username === username)) {
                            try {
                                await addDoc(getCollectionRef('users'), { name, username, password, role: 'student', createdAt: Date.now() });
                                successCount++;
                            } catch(e) { console.error(e); skipCount++; }
                        } else { skipCount++; }
                    }
                }
            }
            showToast(`抄寫完成！成功：${successCount}，略過(已存在/錯誤)：${skipCount}`);
            document.getElementById('bulk-students').value = '';
        };

        window.handleAddCategory = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            try {

            `;
            container.appendChild(div);
        };

        window.handleAddNews = async (e) => {
            e.preventDefault();
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            
            const title = document.getElementById('add-n-title').value.trim();
            const content = document.getElementById('add-n-content').innerHTML;

            const linkUrls = document.querySelectorAll('.link-url');

            for (let i = 0; i < linkNames.length; i++) {

                const u = linkUrls[i].value.trim();
                if (n && u) attachments.push({ name: n, url: u });
            }

            try {
                await addDoc(getCollectionRef('news'), { title, content, attachments, createdAt: Date.now() });

                    categoryId: document.getElementById('up-category').value,

            csvContent += "比賽項目,參賽學生,平均分數,獎項,是否公開,雲端連結\n";
            
            state.data.works.forEach(w => {
                let totalScore = 0; let count = 0;
                if(w.scores) { Object.values(w.scores).forEach(s => { totalScore += s; count++; }); }
                const avgScore = count > 0 ? (totalScore/count).toFixed(1) : '0';
                
                const row = [
                    `"${getCatName(w.categoryId)}"`, `"${getStudentName(w.studentId)}"`, avgScore, `"${w.award || ''}"`, w.isPublic ? '是' : '否', `"${w.driveLink}"`
                ];
                csvContent += row.join(",") + "\n";
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "競賽成績匯出.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        window.filterWorks = (catId) => { window.currentFilterCat = catId; render(); };

        window.deleteDocHandler = async (colName, docId) => {
            if (!state.authUser) return;
            if(confirm("確定要用板擦擦掉嗎？擦掉就找不回來囉！ 🗑️")) {
                try {
                    await deleteDoc(getDocRef(colName, docId));
                    showToast('資料已擦除乾淨');
                } catch (err) { console.error(err); showToast('刪除失敗', 'error'); }
            }
        };

        /* Detail Modals */
        window.viewWorkDetail = async (workId) => {
            const work = state.data.works.find(w => w.id === workId);
            if (!work) return;

            try {
                if(state.authUser) { await updateDoc(getDocRef('works', workId), { views: (work.views || 0) + 1 }); }
            } catch (e) { console.error(e); }

            const catName = state.data.categories.find(c=>c.id===work.categoryId)?.name || '未知';
            const studentName = state.data.users.find(u=>u.id===work.studentId)?.name || '未知同學';
            const displayTitle = `${catName} - ${studentName}`;
            
            let awardHtml = '';
            if (work.award === '優等') {
                awardHtml = `<div class="mb-4 inline-block text-chalk-yellow border border-dashed border-chalk-yellow px-4 py-1.5 rounded-full text-lg font-black bg-chalk-yellow/10 shadow-sm"><i class="fa-solid fa-crown mr-2 mb-1"></i>榮獲優等</div>`;
            } else if (work.award === '佳作') {
                awardHtml = `<div class="mb-4 inline-block text-chalk-blue border border-dashed border-chalk-blue px-3 py-1 rounded-full font-bold bg-chalk-blue/10"><i class="fa-solid fa-medal mr-1"></i>榮獲佳作</div>`;
            }

            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = `
                <div class="text-center mb-6 border-b border-dashed border-chalk-white/20 pb-6">
                    ${awardHtml}
                    <h2 class="text-3xl font-black text-chalk-white mb-5 chalk-text-shadow">${escapeHtml(displayTitle)}</h2>
                    <div class="inline-flex items-center space-x-4 bg-black/20 px-5 py-2 rounded-full border border-chalk-white/10">
                        <span class="text-chalk-white/80 font-bold"><i class="fa-solid fa-user-pen text-chalk-green mr-1 text-lg"></i> ${escapeHtml(studentName)}</span>
                        <span class="text-chalk-white/30 font-bold text-xl">|</span>
                        <span class="text-chalk-white/60 font-bold"><i class="fa-regular fa-eye text-chalk-orange mr-1 text-lg"></i> ${(work.views || 0) + 1} 次觀看</span>
                    </div>
                </div>
                <div class="text-center mt-6">
                    <a href="${escapeHtml(work.driveLink)}" target="_blank" class="chalk-btn chalk-btn-blue px-8 py-3.5 hover:bg-chalk-blue/20 shadow-sm inline-block text-lg">
                        <i class="fa-brands fa-google-drive mr-2 text-xl"></i>開啟完整作品檔案
                    </a>
                </div>
            `;
            document.getElementById('work-modal').classList.remove('hidden');
        };

        window.closeWorkModal = () => { document.getElementById('work-modal').classList.add('hidden'); };

        window.viewNewsDetail = (newsId) => {
            const news = state.data.news.find(n => n.id === newsId);
            if (!news) return;

            let attachmentsHtml = '';
            if (news.attachments && news.attachments.length > 0) {
                attachmentsHtml = `
                    <div class="mt-8 pt-5 border-t border-dashed border-chalk-white/20 flex flex-wrap gap-3">
                        <p class="w-full text-sm font-bold text-chalk-white/60 mb-1"><i class="fa-solid fa-paperclip mr-1 text-chalk-yellow"></i> 附加的連結與檔案：</p>
                        ${news.attachments.map(att => `
                            <a href="${escapeHtml(att.url)}" target="_blank" class="chalk-btn chalk-btn-green text-sm px-4 py-2 hover:bg-chalk-green/20 flex items-center">
                                <i class="fa-solid fa-link mr-2"></i>${escapeHtml(att.name)}
                            </a>
                        `).join('')}
                    </div>
                `;
            }

            const modalContent = document.getElementById('news-modal-content');
            modalContent.innerHTML = `
                <div class="mb-5 border-b border-dashed border-chalk-white/20 pb-5">
                    <h2 class="text-2xl font-black text-chalk-white mb-3 chalk-text-shadow">${escapeHtml(news.title)}</h2>
                    <span class="text-xs font-bold text-chalk-white/60 bg-black/20 px-3 py-1 rounded-full"><i class="fa-regular fa-clock mr-1"></i> 發佈日期：${new Date(news.createdAt).toLocaleDateString('zh-TW')}</span>
                </div>
                <div class="text-chalk-white/90 rich-text-content text-base sm:text-lg min-h-[100px] font-bold">
                    ${news.content}
                </div>
                ${attachmentsHtml}
            `;
            
            document.getElementById('news-modal').classList.remove('hidden');
        };

        window.closeNewsModal = () => { document.getElementById('news-modal').classList.add('hidden'); };

        const escapeHtml = (unsafe) => {
            if(!unsafe) return '';
            return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        };

        window.confirm = (msg) => {
            try { return window.top.confirm(msg); } catch(e) { return true; }
        }

        initAuth();

    </script>
</body>
</html>

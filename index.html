<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫻花盃 國小資訊應用競賽</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: M PLUS Rounded 1c for a friendly, creative look -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'c-red': '#EF476F',      /* 彩色鉛筆 - 紅 */
                        'c-orange': '#F78C6B',   /* 彩色鉛筆 - 橘 */
                        'c-yellow': '#FFD166',   /* 彩色鉛筆 - 黃 */
                        'c-green': '#06D6A0',    /* 彩色鉛筆 - 綠 */
                        'c-blue': '#118AB2',     /* 彩色鉛筆 - 藍 */
                        'c-purple': '#8338EC',   /* 彩色鉛筆 - 紫 */
                        'c-wood': '#E0C9A6',     /* 鉛筆木紋色 */
                        'c-graphite': '#373A40', /* 鉛筆筆芯 (深灰色) */
                        'c-paper': '#FDFBF7'     /* 畫紙白 */
                    },
                    fontFamily: {
                        'sans': ['"M PLUS Rounded 1c"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #FDFBF7; 
            color: #373A40; 
            background-image: url('data:image/svg+xml,%3Csvg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="%23e0c9a6" fill-opacity="0.15" fill-rule="evenodd"%3E%3Ccircle cx="3" cy="3" r="3"/%3E%3Ccircle cx="13" cy="13" r="3"/%3E%3C/g%3E%3C/svg%3E');
        }
        
        .rainbow-gradient-bg {
            background: linear-gradient(90deg, #EF476F, #F78C6B, #FFD166, #06D6A0, #118AB2, #8338EC);
        }

        .sketch-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #f0f0f0;
            transition: all 0.3s ease;
        }
        .sketch-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }

        .rich-text-content p {
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }
        .rich-text-content a {
            color: #118AB2;
            text-decoration: underline;
        }

        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s ease-out; }
        .toast-leave { transform: translateY(0); opacity: 1; }
        .toast-leave-active { transform: translateY(100%); opacity: 0; transition: all 0.3s ease-in; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <!-- 標題 Logo -->
                <div class="flex items-center cursor-pointer hover:opacity-80 transition" onclick="navigate('works')">
                    <i class="fa-solid fa-pencil text-c-red text-2xl mr-2 transform -rotate-45"></i>
                    <span class="font-bold text-xl tracking-wide text-c-graphite" id="nav-site-title">資訊應用競賽</span>
                    <span class="text-sm font-bold ml-2 hidden sm:inline bg-gray-100 text-gray-500 px-2 py-1 rounded-full" id="nav-site-subtitle"></span>
                </div>
                <!-- 選單按鈕 -->
                <div class="flex items-center space-x-2 sm:space-x-4" id="nav-menu">
                    <!-- Nav items injected by JS -->
                </div>
            </div>
        </div>
        <!-- 彩虹漸層底線 -->
        <div class="h-1.5 w-full rainbow-gradient-bg"></div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" id="app-content">
        <div class="flex flex-col justify-center items-center h-64 text-c-blue">
            <i class="fa-solid fa-palette fa-spin text-4xl mb-4"></i>
            <p class="font-bold text-lg">準備畫布中...</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-c-graphite text-white py-6 text-center text-sm">
        <p id="footer-text" class="font-bold">© 2026 資訊應用競賽系統. All Rights Reserved.</p>
        <p class="text-gray-400 mt-1 text-xs">Creative Pencil Style Edition</p>
    </footer>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col space-y-2"></div>

    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

               const firebaseConfig = {
  apiKey: "AIzaSyB6NgZNLvexXfKwkW5eP4tNnkSHwuY8KyM",
  authDomain: "contactbook-c6d95.firebaseapp.com",
  projectId: "contactbook-c6d95",
  storageBucket: "contactbook-c6d95.firebasestorage.app",
  messagingSenderId: "655576113880",
  appId: "1:655576113880:web:15606f5cad291d8aca6dad"
};

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const state = {
            currentPage: 'works', // 預設首頁為作品大廳
            currentUser: null, 
            authUser: null, 
            data: {
                news: [],
                categories: [],
                works: [],
                users: [],
                settings: { title: '櫻花盃', subtitle: '國小資訊應用競賽' }
            },
            unsubscribes: []
        };

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-c-green' : 'bg-c-red';
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            toast.className = `${bgColor} text-white px-6 py-3 rounded-xl shadow-lg flex items-center space-x-3 toast-enter font-bold tracking-wide`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-xl"></i><span>${message}</span>`;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-enter-active');
            });

            setTimeout(() => {
                toast.classList.remove('toast-enter-active');
                toast.classList.add('toast-leave-active');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        window.navigate = (page) => {
            state.currentPage = page;
            render();
        };

        const getCollectionRef = (colName) => collection(db, 'artifacts', appId, 'public', 'data', colName);
        const getDocRef = (colName, docId) => doc(db, 'artifacts', appId, 'public', 'data', colName, docId);

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                showToast("連線錯誤", "error");
                render(); 
            }
        };

        onAuthStateChanged(auth, async (user) => {
            state.authUser = user;
            if (user) {
                setupRealtimeListeners();
                render(); 
            } else {
                cleanupListeners();
                render(); 
            }
        });

        const setupRealtimeListeners = () => {
            cleanupListeners(); 
            
            const collections = ['news', 'categories', 'works', 'users', 'settings'];
            
            collections.forEach(col => {
                const unsubscribe = onSnapshot(getCollectionRef(col), (snapshot) => {
                    if (col === 'settings') {
                        if (!snapshot.empty) {
                            state.data.settings = snapshot.docs[0].data();
                            state.data.settings.id = snapshot.docs[0].id;
                        }
                    } else {
                        state.data[col] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    }
                    
                    if (col === 'users' && state.data.users.length === 0) {
                        createDefaultAdmin();
                    }
                    
                    if (col === 'users' && state.currentUser) {
                        const updatedMe = state.data.users.find(u => u.id === state.currentUser.id);
                        if (!updatedMe) {
                            window.handleLogout();
                            showToast("帳號已被移除", "error");
                        } else {
                            state.currentUser = updatedMe; 
                        }
                    }
                    render();
                }, (error) => {
                    console.error(`Error listening to ${col}:`, error);
                    showToast(`讀取資料失敗 (${col})`, "error");
                });
                state.unsubscribes.push(unsubscribe);
            });
        };

        const cleanupListeners = () => {
            state.unsubscribes.forEach(unsub => unsub());
            state.unsubscribes = [];
        };

        const createDefaultAdmin = async () => {
            try {
                await addDoc(getCollectionRef('users'), {
                    username: 'admin',
                    password: 'admin123',
                    name: '系統管理員',
                    role: 'admin',
                    createdAt: Date.now()
                });
            } catch (e) { console.error(e); }
        };

        const render = () => {
            const content = document.getElementById('app-content');
            
            // 更新網站設定的標題
            document.title = `${state.data.settings.title} | ${state.data.settings.subtitle}`;
            document.getElementById('nav-site-title').innerHTML = escapeHtml(state.data.settings.title);
            document.getElementById('nav-site-subtitle').innerHTML = escapeHtml(state.data.settings.subtitle);
            document.getElementById('footer-text').innerText = `© 2026 ${state.data.settings.title} ${state.data.settings.subtitle}. All Rights Reserved.`;

            if (!state.authUser) {
                content.innerHTML = `<div class="flex flex-col justify-center items-center h-64 text-c-red"><i class="fa-solid fa-triangle-exclamation text-5xl mb-4"></i><p class="text-xl font-bold">連線失敗，請重新整理頁面。</p></div>`;
                return; 
            }
            
            renderNav();
            
            switch (state.currentPage) {
                case 'home': content.innerHTML = tmplHome(); break;
                case 'works': content.innerHTML = tmplWorks(); break;
                case 'login': content.innerHTML = tmplLogin(); break;
                case 'admin': content.innerHTML = state.currentUser?.role === 'admin' ? tmplAdmin() : tmplWorks(); break;
                case 'student': content.innerHTML = state.currentUser?.role === 'student' ? tmplStudent() : tmplWorks(); break;
                case 'judge': content.innerHTML = state.currentUser?.role === 'judge' ? tmplJudge() : tmplWorks(); break;
                default: content.innerHTML = tmplWorks();
            }
        };

        const renderNav = () => {
            const menu = document.getElementById('nav-menu');
            let html = `
                <button onclick="navigate('works')" class="hover:text-c-blue font-bold transition px-3 py-2 ${state.currentPage==='works'?'text-c-blue border-b-4 border-c-blue pb-1':'text-gray-600'}">作品大廳</button>
                <button onclick="navigate('home')" class="hover:text-c-orange font-bold transition px-3 py-2 ${state.currentPage==='home'?'text-c-orange border-b-4 border-c-orange pb-1':'text-gray-600'}">最新消息</button>
            `;

            if (!state.currentUser) {
                html += `<button onclick="navigate('login')" class="bg-c-blue text-white hover:bg-blue-600 transition px-5 py-1.5 rounded-full ml-2 text-sm font-bold shadow-sm">登入系統</button>`;
            } else {
                const roleLabels = { admin: '管理系統', student: '學生專區', judge: '評分專區' };
                const rolePage = state.currentUser.role;
                const roleColors = { admin: 'c-red', student: 'c-green', judge: 'c-purple' };
                const cColor = roleColors[rolePage];

                html += `
                    <button onclick="navigate('${rolePage}')" class="text-${cColor} font-bold hover:opacity-70 transition px-3 py-2 ${state.currentPage===rolePage?`border-b-4 border-${cColor} pb-1`:''}">${roleLabels[rolePage]}</button>
                    <span class="text-sm font-bold text-gray-500 hidden md:inline border-l-2 pl-4 border-gray-200 ml-2 py-1"><i class="fa-solid fa-user-circle mr-1"></i>${state.currentUser.name}</span>
                    <button onclick="handleLogout()" class="text-gray-400 hover:text-c-red transition px-3 py-2 ml-1" title="登出"><i class="fa-solid fa-sign-out-alt text-lg"></i></button>
                `;
            }
            menu.innerHTML = html;
        };

        /* ================== 作品大廳 (Works) ================== */
        const tmplWorks = () => {
            window.currentFilterCat = window.currentFilterCat || '';
            const getCatName = (id) => state.data.categories.find(c => c.id === id)?.name || '未分類';
            const getStudentName = (id) => state.data.users.find(u => u.id === id)?.name || '未知學生';
            
            let displayWorks = state.data.works.filter(w => w.isPublic); // 只顯示公開作品
            if (window.currentFilterCat) {
                displayWorks = displayWorks.filter(w => w.categoryId === window.currentFilterCat);
            }
            
            const worksHtml = displayWorks.map(w => {
                const displayTitle = `${getCatName(w.categoryId)} - ${getStudentName(w.studentId)}`;
                
                let awardHtml = '';
                if (w.award === '優等') {
                    awardHtml = `<span class="ml-3 text-c-yellow border-2 border-c-yellow px-3 py-1 rounded-full text-sm font-black bg-yellow-50 shadow-sm"><i class="fa-solid fa-crown text-lg mr-1 mb-1"></i>優等</span>`;
                } else if (w.award === '佳作') {
                    awardHtml = `<span class="ml-3 text-c-blue border border-c-blue px-2 py-0.5 rounded-full text-xs font-bold bg-blue-50"><i class="fa-solid fa-medal mr-1"></i>佳作</span>`;
                }

                return `
                <div class="sketch-card p-6 flex flex-col justify-between cursor-pointer border-t-4 border-t-c-blue" onclick="viewWorkDetail('${w.id}')">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-gray-100 text-gray-600 text-xs px-3 py-1 rounded-full font-bold">${escapeHtml(getCatName(w.categoryId))}</span>
                            <span class="text-gray-400 text-xs font-bold bg-gray-50 px-2 py-1 rounded-full"><i class="fa-regular fa-eye text-c-blue"></i> ${w.views || 0}</span>
                        </div>
                        <h3 class="text-xl font-bold mb-2 text-c-graphite hover:text-c-blue transition flex items-center flex-wrap gap-2">
                            ${escapeHtml(displayTitle)} ${awardHtml}
                        </h3>
                    </div>
                    <div class="pt-4 mt-auto border-t border-gray-100">
                        <span class="text-sm font-bold text-gray-500"><i class="fa-solid fa-user-pen text-c-green mr-1"></i> ${escapeHtml(getStudentName(w.studentId))}</span>
                    </div>
                </div>
            `}).join('') || `
                <div class="col-span-full text-center py-16 bg-white rounded-2xl border-2 border-dashed border-gray-300">
                    <i class="fa-solid fa-folder-open text-6xl text-gray-200 mb-4"></i>
                    <p class="text-gray-500 font-bold text-lg">目前尚無公開的作品喔！</p>
                </div>`;

            const catOptions = state.data.categories.map(c => `<option value="${c.id}" ${window.currentFilterCat === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');

            return `
                <div class="max-w-6xl mx-auto">
                    <div class="flex flex-col sm:flex-row justify-between items-end sm:items-center mb-8 pb-4 border-b-2 border-gray-200">
                        <div class="flex items-center mb-4 sm:mb-0">
                            <i class="fa-solid fa-palette text-c-orange text-4xl mr-3 transform -rotate-12"></i>
                            <h2 class="text-3xl font-black text-c-graphite">競賽作品大廳</h2>
                        </div>
                        <div class="flex items-center bg-white px-4 py-2 rounded-xl border border-gray-200 shadow-sm w-full sm:w-auto">
                            <i class="fa-solid fa-filter text-c-blue mr-2"></i>
                            <span class="text-sm font-bold text-gray-600 mr-2 whitespace-nowrap">分類篩選：</span>
                            <select onchange="filterWorks(this.value)" class="border-none focus:ring-0 text-sm font-bold text-c-graphite bg-transparent cursor-pointer outline-none">
                                <option value="">展示全部作品</option>
                                ${catOptions}
                            </select>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${worksHtml}
                    </div>
                </div>

                <!-- Work Detail Modal -->
                <div id="work-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
                    <div class="sketch-card w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 relative border-t-8 border-t-c-yellow">
                        <button onclick="closeWorkModal()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-c-red hover:text-white transition"><i class="fa-solid fa-times"></i></button>
                        <div id="modal-content"></div>
                    </div>
                </div>
            `;
        };

        /* ================== 最新消息 (News) ================== */
        const tmplHome = () => {
            const newsHtml = state.data.news.sort((a,b) => b.createdAt - a.createdAt).map(n => `
                <div class="bg-white px-6 py-5 border-b border-gray-100 hover:bg-gray-50 transition cursor-pointer flex flex-col sm:flex-row sm:items-center justify-between group rounded-xl mb-2" onclick="viewNewsDetail('${n.id}')">
                    <div class="flex-grow">
                        <h3 class="text-lg font-bold text-c-graphite group-hover:text-c-blue transition flex items-center">
                            <i class="fa-solid fa-angle-right text-c-orange mr-2 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                            ${escapeHtml(n.title)}
                        </h3>
                    </div>
                    <div class="mt-2 sm:mt-0 flex-shrink-0 text-sm font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full">
                        <i class="fa-regular fa-calendar-alt mr-1"></i> ${new Date(n.createdAt).toLocaleDateString('zh-TW')}
                    </div>
                </div>
            `).join('') || `
                <div class="text-center p-12 bg-white rounded-2xl border-2 border-dashed border-gray-300">
                    <i class="fa-regular fa-bell-slash text-5xl text-gray-300 mb-3"></i>
                    <p class="text-gray-500 font-bold">目前尚無公佈消息喔！</p>
                </div>`;

            return `
                <div class="max-w-4xl mx-auto mt-4">
                    <div class="flex items-center mb-6 pb-2 border-b-2 border-gray-200">
                        <i class="fa-solid fa-bullhorn text-c-red text-3xl mr-3"></i>
                        <h2 class="text-2xl font-black text-c-graphite">最新消息廣播</h2>
                    </div>
                    <div class="sketch-card overflow-hidden border-none shadow-sm bg-white p-2">
                        ${newsHtml}
                    </div>
                </div>

                <!-- News Detail Modal -->
                <div id="news-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
                    <div class="sketch-card w-full max-w-3xl max-h-[90vh] overflow-y-auto p-8 relative border-t-8 border-t-c-red">
                        <button onclick="closeNewsModal()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-c-red hover:text-white transition"><i class="fa-solid fa-times"></i></button>
                        <div id="news-modal-content"></div>
                    </div>
                </div>
            `;
        };

        /* ================== 登入頁面 (Login) ================== */
        const tmplLogin = () => `
            <div class="max-w-md mx-auto mt-12 sketch-card p-10 border-t-8 border-t-c-green">
                <div class="text-center mb-8">
                    <i class="fa-solid fa-face-smile text-c-green text-5xl mb-4"></i>
                    <h2 class="text-3xl font-black text-c-graphite">歡迎登入</h2>
                    <p class="text-sm font-bold text-gray-400 mt-2">請輸入您的帳號密碼</p>
                </div>
                <form onsubmit="handleLogin(event)" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-c-graphite mb-2">帳號</label>
                        <input type="text" id="login-username" required class="w-full border-2 border-gray-200 rounded-xl p-3 focus:outline-none focus:border-c-green bg-gray-50 font-bold transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-c-graphite mb-2">密碼</label>
                        <input type="password" id="login-password" required class="w-full border-2 border-gray-200 rounded-xl p-3 focus:outline-none focus:border-c-green bg-gray-50 font-bold transition">
                    </div>
                    <button type="submit" class="w-full bg-c-green text-white font-bold py-3 rounded-xl hover:bg-emerald-500 transition shadow-sm text-lg mt-4">立即登入</button>
                </form>
            </div>
        `;

        /* ================== 管理後台 (Admin) ================== */
        const tmplAdmin = () => {
            window.currentAdminTab = window.currentAdminTab || 'grades';
            
            const tabClass = (tab, color) => window.currentAdminTab === tab 
                ? `bg-${color} text-white px-5 py-2.5 font-bold rounded-t-xl shadow-sm z-10 relative` 
                : 'bg-white text-gray-500 hover:bg-gray-50 px-5 py-2.5 font-bold rounded-t-xl cursor-pointer border border-b-0 border-gray-200';

            let tabContent = '';
            
            if (window.currentAdminTab === 'settings') {
                tabContent = `
                    <div class="p-2">
                        <h3 class="font-black mb-4 border-b border-gray-100 pb-3 text-c-graphite text-lg"><i class="fa-solid fa-sliders text-c-purple mr-2"></i>網站標題設定</h3>
                        <form onsubmit="handleSaveSettings(event)" class="space-y-5 max-w-md">
                            <div><label class="block text-sm font-bold mb-2">網站主標題 (短)</label><input type="text" id="set-title" value="${escapeHtml(state.data.settings.title)}" required class="w-full border-2 border-gray-200 rounded-lg p-2.5 bg-gray-50 focus:border-c-purple outline-none font-bold"></div>

        /* ================== Actions & Handlers ================== */

            const data = {
                name: document.getElementById('add-u-name').value.trim(),
                username: document.getElementById('add-u-username').value.trim(),
                password: document.getElementById('add-u-pwd').value,
                role: document.getElementById('add-u-role').value,

            };

            try {

        };

        window.handleBulkImport = async () => {
            if (!state.authUser || state.currentUser?.role !== 'admin') return;
            const text = document.getElementById('bulk-students').value.trim();
            if (!text) { showToast('請輸入匯入資料', 'error'); return; }
            
            const lines = text.split('\n');
            let successCount = 0; let skipCount = 0;
            
            showToast('資料處理中...');
            for (let line of lines) {
                const parts = line.split(',').map(s => s.trim());
                if (parts.length >= 3) {
                    const [name, username, password] = parts;
                    if (name && username && password) {
                        if (!state.data.users.some(u => u.username === username)) {
                            try {
                                await addDoc(getCollectionRef('users'), { name, username, password, role: 'student', createdAt: Date.now() });
                                successCount++;
                            } catch(e) { console.error(e); skipCount++; }
                        } else { skipCount++; }
                    }
                }
            }
            showToast(`匯入完成！成功：${successCount}，略過(已存在/錯誤)：${skipCount}`);
            document.getElementById('bulk-students').value = '';
        };

                </div>
                <div class="text-center mt-6">
                    <a href="${escapeHtml(work.driveLink)}" target="_blank" class="bg-c-blue text-white px-8 py-3.5 rounded-xl font-black hover:bg-blue-600 transition shadow-sm inline-block text-lg">
                        <i class="fa-brands fa-google-drive mr-2 text-xl"></i>開啟完整作品檔案
                    </a>
                </div>
            `;
            document.getElementById('work-modal').classList.remove('hidden');
        };

        window.closeWorkModal = () => { document.getElementById('work-modal').classList.add('hidden'); };

        window.viewNewsDetail = (newsId) => {
            const news = state.data.news.find(n => n.id === newsId);
            if (!news) return;

            let attachmentsHtml = '';
            if (news.attachments && news.attachments.length > 0) {
                attachmentsHtml = `
                    <div class="mt-8 pt-5 border-t-2 border-dashed border-gray-200 flex flex-wrap gap-3">
                        <p class="w-full text-sm font-bold text-gray-500 mb-1"><i class="fa-solid fa-paperclip mr-1"></i> 相關連結：</p>
                        ${news.attachments.map(att => `
                            <a href="${escapeHtml(att.url)}" target="_blank" class="text-sm border-2 border-gray-200 text-gray-600 hover:border-c-blue hover:text-c-blue px-4 py-2 rounded-lg transition font-bold bg-gray-50 flex items-center">
                                <i class="fa-solid fa-link mr-2 text-c-blue"></i>${escapeHtml(att.name)}
                            </a>
                        `).join('')}
                    </div>
                `;
            }

            const modalContent = document.getElementById('news-modal-content');
            modalContent.innerHTML = `
                <div class="mb-5 border-b border-gray-100 pb-5">
                    <h2 class="text-2xl font-black text-c-graphite mb-3">${escapeHtml(news.title)}</h2>
                    <span class="text-xs font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full"><i class="fa-regular fa-clock mr-1"></i> 發佈日期：${new Date(news.createdAt).toLocaleDateString('zh-TW')}</span>
                </div>
                <div class="text-gray-700 rich-text-content text-base sm:text-lg min-h-[100px] font-bold">
                    ${news.content}
                </div>
                ${attachmentsHtml}
            `;
            
            document.getElementById('news-modal').classList.remove('hidden');
        };

        window.closeNewsModal = () => { document.getElementById('news-modal').classList.add('hidden'); };

        const escapeHtml = (unsafe) => {
            if(!unsafe) return '';
            return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        };

        window.confirm = (msg) => {
            try { return window.top.confirm(msg); } catch(e) { return true; }
        }

        initAuth();

    </script>
</body>
</html>
